<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Телефон как веб-камера</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .card { background: #2d2d2d; border-radius: 20px; padding: 24px; max-width: 500px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; color: #fff; }
        .qr-container { background: white; padding: 20px; border-radius: 20px; display: inline-block; margin: 20px 0; }
        video { width: 100%; border-radius: 12px; background: black; margin: 10px 0; }
        .status { background: #3a3a3a; padding: 10px; border-radius: 30px; margin: 10px 0; }
        button { background: #007bff; border: none; color: white; padding: 12px 24px; border-radius: 30px; font-size: 16px; cursor: pointer; margin: 5px; }
        button.danger { background: #dc3545; }
        input { width: 100%; padding: 12px; border-radius: 30px; border: none; margin: 10px 0; font-size: 16px; }
        .hidden { display: none; }
    </style>
    <!-- Библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/instascan@2.0.0-rc.1/dist/instascan.min.js"></script>
</head>
<body>
    <div class="card">
        <!-- Десктопная версия (ПК) -->
        <div id="desktop-view" class="hidden">
            <h2>🖥️ Компьютер</h2>
            <p>Отсканируйте код камерой телефона</p>
            <div id="qrcode" class="qr-container"></div>
            <div class="status" id="desktop-status">Ожидание подключения...</div>
            <video id="remote-video" autoplay playsinline style="display: none;"></video>
            <button id="reset-desktop">🔄 Новый код</button>
        </div>

        <!-- Мобильная версия (телефон) -->
        <div id="mobile-view" class="hidden">
            <h2>📱 Телефон</h2>
            <!-- Режим сканера -->
            <div id="scanner-section">
                <p>Наведите камеру на QR-код</p>
                <video id="preview" style="width:100%; border-radius:12px;"></video>
                <div class="status" id="scanner-status">Сканирование...</div>
                <button id="manual-connect">🔤 Ввести ID вручную</button>
            </div>
            <!-- Ручной ввод ID -->
            <div id="manual-section" class="hidden">
                <input type="text" id="peer-id-input" placeholder="ID с ПК">
                <button id="connect-manual">Подключиться</button>
                <button id="back-to-scanner">← Назад</button>
            </div>
            <!-- Режим трансляции -->
            <div id="streaming-section" class="hidden">
                <video id="local-video" autoplay playsinline muted style="width:100%;"></video>
                <div class="status" id="stream-status">Трансляция идёт</div>
                <button class="danger" id="stop-stream">⏹️ Остановить</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            // DOM элементы
            const desktopView = document.getElementById('desktop-view');
            const mobileView = document.getElementById('mobile-view');
            const qrcodeDiv = document.getElementById('qrcode');
            const desktopStatus = document.getElementById('desktop-status');
            const remoteVideo = document.getElementById('remote-video');
            const resetBtn = document.getElementById('reset-desktop');

            const scannerSection = document.getElementById('scanner-section');
            const manualSection = document.getElementById('manual-section');
            const streamingSection = document.getElementById('streaming-section');
            const preview = document.getElementById('preview');
            const scannerStatus = document.getElementById('scanner-status');
            const manualConnectBtn = document.getElementById('manual-connect');
            const backToScanner = document.getElementById('back-to-scanner');
            const connectManualBtn = document.getElementById('connect-manual');
            const peerIdInput = document.getElementById('peer-id-input');
            const localVideo = document.getElementById('local-video');
            const streamStatus = document.getElementById('stream-status');
            const stopStreamBtn = document.getElementById('stop-stream');

            // Переменные состояния
            let peer = null;
            let currentCall = null;
            let localStream = null;
            let scanner = null;

            // ---------- Утилиты ----------
            function stopScanner() {
                if (scanner) {
                    scanner.stop().catch(e => console.warn('scanner stop', e));
                    scanner = null;
                }
                if (preview.srcObject) {
                    preview.srcObject.getTracks().forEach(t => t.stop());
                    preview.srcObject = null;
                }
            }

            function stopLocalStream() {
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                    localStream = null;
                }
            }

            function cleanupCall() {
                if (currentCall) {
                    currentCall.close();
                    currentCall = null;
                }
            }

            // ---------- ПК (десктоп) ----------
            function initDesktop() {
                if (peer) peer.destroy();
                peer = new Peer();

                peer.on('open', (id) => {
                    desktopStatus.textContent = 'Ваш ID: ' + id;
                    qrcodeDiv.innerHTML = '';
                    new QRCode(qrcodeDiv, {
                        text: window.location.origin + window.location.pathname + '?connect=' + id,
                        width: 250,
                        height: 250
                    });
                });

                peer.on('call', (call) => {
                    desktopStatus.textContent = '📞 Входящий звонок...';
                    call.answer(); // ПК не отправляет видео

                    call.on('stream', (stream) => {
                        remoteVideo.style.display = 'block';
                        remoteVideo.srcObject = stream;
                        remoteVideo.play().catch(e => console.warn('play error', e));
                        desktopStatus.textContent = '✅ Трансляция с телефона';
                    });

                    call.on('close', () => {
                        remoteVideo.style.display = 'none';
                        remoteVideo.srcObject = null;
                        desktopStatus.textContent = '❌ Телефон отключился';
                        currentCall = null;
                    });

                    call.on('error', (err) => {
                        console.error('Call error', err);
                        desktopStatus.textContent = 'Ошибка вызова';
                    });

                    currentCall = call;
                });

                peer.on('error', (err) => {
                    desktopStatus.textContent = 'Ошибка: ' + err.type;
                    console.error(err);
                });
            }

            resetBtn.addEventListener('click', () => {
                if (peer) peer.destroy();
                remoteVideo.style.display = 'none';
                remoteVideo.srcObject = null;
                qrcodeDiv.innerHTML = '';
                desktopStatus.textContent = 'Генерируем...';
                initDesktop();
            });

            // ---------- Телефон ----------
            async function startStreaming(remoteId) {
                stopScanner(); // освобождаем камеру от сканера
                scannerSection.classList.add('hidden');
                manualSection.classList.add('hidden');
                streamingSection.classList.remove('hidden');
                streamStatus.textContent = '⏳ Запрашиваем камеру...';

                // Небольшая задержка для гарантии освобождения
                await new Promise(r => setTimeout(r, 500));

                try {
                    localStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { ideal: 'environment' } }, // задняя камера
                        audio: false
                    });
                    localVideo.srcObject = localStream;

                    if (peer) peer.destroy();
                    peer = new Peer();

                    peer.on('open', () => {
                        streamStatus.textContent = '🔌 Подключаемся...';
                        const call = peer.call(remoteId, localStream);
                        currentCall = call;

                        call.on('close', () => {
                            resetMobileToScanner('Соединение закрыто');
                        });

                        call.on('error', (err) => {
                            console.error('Call error', err);
                            resetMobileToScanner('Ошибка соединения');
                        });

                        streamStatus.textContent = '✅ Трансляция активна';
                    });

                    peer.on('error', (err) => {
                        console.error('Peer error', err);
                        resetMobileToScanner('Ошибка Peer');
                    });
                } catch (err) {
                    console.error('getUserMedia error', err);
                    streamStatus.textContent = '❌ Нет доступа к камере';
                    // Оставляем возможность остановить
                }
            }

            function resetMobileToScanner(reason) {
                cleanupCall();
                if (peer) peer.destroy();
                stopLocalStream();
                peer = null;
                streamingSection.classList.add('hidden');
                scannerSection.classList.remove('hidden');
                manualSection.classList.add('hidden');
                scannerStatus.textContent = reason || 'Сканирование...';
                initMobileScanner();
            }

            // ---------- Инициализация сканера ----------
            function initMobileScanner() {
                stopScanner();
                scanner = new Instascan.Scanner({ video: preview, mirror: false, scanPeriod: 2 });
                scanner.addListener('scan', (content) => {
                    scannerStatus.textContent = '✅ QR найден!';
                    try {
                        const url = new URL(content);
                        const connectId = url.searchParams.get('connect');
                        if (connectId) {
                            stopScanner();
                            startStreaming(connectId);
                        } else {
                            scannerStatus.textContent = '❌ Нет ID в QR';
                        }
                    } catch (e) {
                        scannerStatus.textContent = '❌ Неверный QR';
                    }
                });

                Instascan.Camera.getCameras().then((cameras) => {
                    if (cameras.length > 0) {
                        const rear = cameras.find(c => c.name.toLowerCase().includes('back') || c.name.toLowerCase().includes('rear'));
                        scanner.start(rear || cameras[0]);
                        scannerStatus.textContent = '📷 Камера готова';
                    } else {
                        scannerStatus.textContent = '❌ Камера не найдена';
                    }
                }).catch((err) => {
                    scannerStatus.textContent = '❌ Ошибка камеры';
                    console.error(err);
                });
            }

            // ---------- Обработчики для телефона ----------
            manualConnectBtn.addEventListener('click', () => {
                stopScanner();
                scannerSection.classList.add('hidden');
                manualSection.classList.remove('hidden');
            });

            backToScanner.addEventListener('click', () => {
                manualSection.classList.add('hidden');
                scannerSection.classList.remove('hidden');
                initMobileScanner();
            });

            connectManualBtn.addEventListener('click', () => {
                const id = peerIdInput.value.trim();
                if (id) {
                    startStreaming(id);
                } else {
                    alert('Введите ID');
                }
            });

            stopStreamBtn.addEventListener('click', () => {
                resetMobileToScanner('Трансляция остановлена');
            });

            // ---------- Запуск ----------
            function init() {
                if (isMobile) {
                    mobileView.classList.remove('hidden');
                    desktopView.classList.add('hidden');

                    // Проверяем параметр connect в URL (если перешли по ссылке после сканирования)
                    const urlParams = new URLSearchParams(window.location.search);
                    const connectId = urlParams.get('connect');
                    if (connectId) {
                        // Чистим URL
                        window.history.replaceState({}, document.title, window.location.pathname);
                        startStreaming(connectId);
                    } else {
                        resetMobileToScanner('Готов к сканированию');
                    }
                } else {
                    desktopView.classList.remove('hidden');
                    mobileView.classList.add('hidden');
                    initDesktop();
                }
            }

            init();
        })();
    </script>
</body>
</html>
