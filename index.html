<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Телефон как веб-камера (автовыбор сервера)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0b0f14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: #1e242b;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            padding: 24px;
            color: #f0f4f8;
        }
        h2 { font-weight: 600; margin-bottom: 16px; color: white; }
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 24px;
            display: inline-block;
            margin: 16px 0;
        }
        #qrcode { display: flex; justify-content: center; }
        .status {
            background: #2a333d;
            border-radius: 40px;
            padding: 12px 20px;
            margin: 16px 0;
            color: #99c2ff;
            font-weight: 500;
        }
        .video-container {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin: 16px 0;
            aspect-ratio: 16/9;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .scanner-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: #2c3e50;
            border-radius: 24px;
            overflow: hidden;
            margin: 16px 0;
            position: relative;
        }
        #preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn {
            background: #3a6ea5;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            max-width: 280px;
            margin: 8px auto;
            border: 1px solid #5f8bc9;
        }
        .btn:active { background: #2c4f7a; transform: scale(0.97); }
        .btn.danger { background: #b02e2e; border-color: #d66; }
        .btn.secondary { background: #4b5c6b; border-color: #7f8c8d; }
        .hidden { display: none; }
        .info { color: #a0b3cc; font-size: 14px; margin-top: 16px; }
        .error { color: #ff9999; }
        input { width: 100%; padding: 12px; border-radius: 30px; border: none; margin: 10px 0; font-size: 16px; background: #2a333d; color: white; }
    </style>

    <!-- Библиотеки: PeerJS 1.5.2 + jsQR + qrcode -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="card">
        <!-- Компьютер (ПК) -->
        <div id="desktop-view" class="hidden">
            <h2>🖥️ Компьютер</h2>
            <p>Отсканируйте этот QR‑код камерой телефона</p>
            <div class="qr-container" id="qrcode"></div>
            <div class="status" id="desktop-status">Генерация кода...</div>
            <div id="desktop-video-box" class="video-container hidden">
                <video id="remote-video" autoplay playsinline></video>
            </div>
            <button class="btn" id="reset-desktop">🔄 Новый QR‑код</button>
            <div class="info" id="desktop-info"></div>
        </div>

        <!-- Телефон -->
        <div id="mobile-view" class="hidden">
            <h2 id="mobile-title">📱 Телефон</h2>
            <!-- Режим сканера -->
            <div id="mobile-scanner">
                <p>Наведите камеру на QR‑код с ПК</p>
                <div class="scanner-container">
                    <video id="preview" autoplay playsinline></video>
                </div>
                <div class="status" id="scanner-status">Сканирование...</div>
                <button class="btn secondary" id="manual-connect-btn">🔤 Ввести ID вручную</button>
            </div>
            <!-- Режим ручного ввода ID -->
            <div id="manual-connect" class="hidden">
                <p>Введите ID, отображаемый на компьютере</p>
                <input type="text" id="peer-id-input" placeholder="например pc-abc123">
                <button class="btn" id="connect-manual">Подключиться</button>
                <button class="btn secondary" id="back-to-scanner">← Назад к сканеру</button>
            </div>
            <!-- Режим трансляции -->
            <div id="mobile-streaming" class="hidden">
                <div class="video-container">
                    <video id="local-video" autoplay playsinline muted></video>
                </div>
                <div class="status" id="stream-status">🔴 Трансляция активна</div>
                <button class="btn danger" id="stop-stream">⏹️ Остановить и вернуться</button>
            </div>
            <div class="info" id="mobile-info"></div>
        </div>
    </div>

    <script>
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            // DOM
            const desktopView = document.getElementById('desktop-view');
            const mobileView = document.getElementById('mobile-view');
            const qrcodeDiv = document.getElementById('qrcode');
            const desktopStatus = document.getElementById('desktop-status');
            const desktopInfo = document.getElementById('desktop-info');
            const remoteVideo = document.getElementById('remote-video');
            const remoteVideoBox = document.getElementById('desktop-video-box');
            const resetBtn = document.getElementById('reset-desktop');

            const mobileScanner = document.getElementById('mobile-scanner');
            const manualConnectDiv = document.getElementById('manual-connect');
            const mobileStreaming = document.getElementById('mobile-streaming');
            const mobileTitle = document.getElementById('mobile-title');
            const scannerStatus = document.getElementById('scanner-status');
            const preview = document.getElementById('preview');
            const localVideo = document.getElementById('local-video');
            const streamStatus = document.getElementById('stream-status');
            const stopBtn = document.getElementById('stop-stream');
            const mobileInfo = document.getElementById('mobile-info');
            const manualConnectBtn = document.getElementById('manual-connect-btn');
            const backToScanner = document.getElementById('back-to-scanner');
            const connectManualBtn = document.getElementById('connect-manual');
            const peerIdInput = document.getElementById('peer-id-input');

            // Общие переменные
            let peer = null;
            let currentCall = null;
            let localStream = null;
            let scannerStream = null;
            let scanInterval = null;
            let currentPeerId = null;

            // Список серверов PeerJS для попыток подключения (порядок важен)
            const peerServers = [
                { host: 'peerjs.com', port: 443, secure: true, key: 'peerjs' },          // официальный облачный
                { host: '0.peerjs.com', port: 9000, secure: false, key: 'peerjs' },       // старый (иногда работает)
                { host: 'peerjs-server.herokuapp.com', port: 443, secure: true, key: 'peerjs' } // ещё один публичный
            ];

            // ---------- Вспомогательные функции ----------
            function stopScannerStream() {
                if (scannerStream) {
                    scannerStream.getTracks().forEach(track => track.stop());
                    scannerStream = null;
                }
                if (preview.srcObject) {
                    preview.srcObject = null;
                }
                if (scanInterval) {
                    clearInterval(scanInterval);
                    scanInterval = null;
                }
            }

            function stopLocalStream() {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
            }

            function resetMobileToScanner(reason) {
                if (currentCall) currentCall.close();
                if (peer) peer.destroy();
                stopLocalStream();
                peer = null;
                currentCall = null;

                mobileScanner.classList.remove('hidden');
                manualConnectDiv.classList.add('hidden');
                mobileStreaming.classList.add('hidden');
                mobileTitle.textContent = '📱 Телефон';
                scannerStatus.textContent = reason || 'Сканирование...';
                initMobileScanner();
            }

            // ---------- Параметры URL ----------
            function getConnectParam() {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('connect');
            }

            function removeConnectParam() {
                const url = new URL(window.location);
                url.searchParams.delete('connect');
                window.history.replaceState({}, document.title, url);
            }

            // ---------- Создание Peer с перебором серверов ----------
            function createPeer(id, onSuccess, onFailure) {
                let currentServerIndex = 0;

                function tryNextServer() {
                    if (currentServerIndex >= peerServers.length) {
                        onFailure('Ни один сервер не ответил');
                        return;
                    }

                    const server = peerServers[currentServerIndex++];
                    const peerOptions = {
                        host: server.host,
                        port: server.port,
                        secure: server.secure,
                        key: server.key,
                        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] },
                        debug: 2 // подробные логи в консоль
                    };

                    desktopInfo.textContent = `⏳ Подключение к ${server.host}...`;
                    const newPeer = id ? new Peer(id, peerOptions) : new Peer(peerOptions);

                    const timeout = setTimeout(() => {
                        // Если за 5 секунд нет ответа, считаем сервер недоступным
                        newPeer.destroy();
                        tryNextServer();
                    }, 5000);

                    newPeer.on('open', (assignedId) => {
                        clearTimeout(timeout);
                        desktopInfo.textContent = `✅ Подключено к ${server.host}`;
                        onSuccess(newPeer, assignedId);
                    });

                    newPeer.on('error', (err) => {
                        clearTimeout(timeout);
                        console.warn(`Сервер ${server.host} ошибка:`, err);
                        newPeer.destroy();
                        tryNextServer();
                    });
                }

                tryNextServer();
            }

            // ---------- ПК: генерация QR и создание Peer ----------
            function generateQRWithId(id) {
                qrcodeDiv.innerHTML = '';
                new QRCode(qrcodeDiv, {
                    text: `${window.location.origin}${window.location.pathname}?connect=${id}`,
                    width: 250,
                    height: 250,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }

            function initDesktop() {
                currentPeerId = 'pc-' + Math.random().toString(36).substring(2, 8);
                desktopStatus.textContent = `ID: ${currentPeerId}`;
                generateQRWithId(currentPeerId);
                desktopInfo.textContent = '⏳ Поиск доступного сервера...';

                createPeer(currentPeerId, (newPeer, id) => {
                    peer = newPeer;

                    peer.on('call', (call) => {
                        console.log('📞 Входящий звонок');
                        desktopStatus.textContent = '📞 Входящий звонок...';
                        call.answer();

                        call.on('stream', (remoteStream) => {
                            console.log('📹 Поток получен');
                            remoteVideoBox.classList.remove('hidden');
                            remoteVideo.srcObject = remoteStream;
                            remoteVideo.play().catch(e => console.warn('play error', e));
                            desktopStatus.textContent = '✅ Трансляция с телефона';
                        });

                        call.on('close', () => {
                            console.log('❌ Звонок закрыт');
                            remoteVideo.srcObject = null;
                            remoteVideoBox.classList.add('hidden');
                            desktopStatus.textContent = `ID: ${currentPeerId} (ожидание)`;
                            currentCall = null;
                        });

                        call.on('error', (err) => {
                            console.error('Ошибка звонка:', err);
                            remoteVideoBox.classList.add('hidden');
                            desktopStatus.textContent = 'Ошибка соединения';
                        });

                        currentCall = call;
                    });
                }, (errorMsg) => {
                    desktopInfo.innerHTML = `<span class="error">⚠️ ${errorMsg}. Видеосвязь может не работать, но QR-код действителен.</span>`;
                });
            }

            resetBtn.addEventListener('click', () => {
                if (peer) peer.destroy();
                if (currentCall) currentCall.close();
                remoteVideo.srcObject = null;
                remoteVideoBox.classList.add('hidden');
                initDesktop();
            });

            // ---------- Телефон: сканер (jsQR) ----------
            async function initMobileScanner() {
                stopScannerStream();

                try {
                    scannerStream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' }
                    });
                    preview.srcObject = scannerStream;
                    await preview.play();

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    scannerStatus.textContent = 'Сканирование...';

                    scanInterval = setInterval(() => {
                        if (!preview.videoWidth) return;
                        canvas.width = preview.videoWidth;
                        canvas.height = preview.videoHeight;
                        ctx.drawImage(preview, 0, 0, canvas.width, canvas.height);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' });
                        if (code) {
                            const content = code.data;
                            scannerStatus.textContent = '✅ QR найден!';
                            try {
                                const url = new URL(content);
                                const connectId = url.searchParams.get('connect');
                                if (connectId) {
                                    stopScannerStream();
                                    startStreamingAndCall(connectId);
                                } else {
                                    scannerStatus.textContent = 'Неверный QR (нет ID)';
                                }
                            } catch (e) {
                                scannerStatus.textContent = 'Не является ссылкой';
                            }
                        }
                    }, 500);
                } catch (err) {
                    console.error('Ошибка доступа к камере:', err);
                    scannerStatus.textContent = 'Нет доступа к камере';
                    mobileInfo.textContent = 'Разрешите доступ к камере или используйте ручной ввод.';
                }
            }

            // ---------- Телефон: начало трансляции и звонок на ПК ----------
            async function startStreamingAndCall(remoteId) {
                stopScannerStream();
                mobileScanner.classList.add('hidden');
                manualConnectDiv.classList.add('hidden');
                mobileStreaming.classList.remove('hidden');
                streamStatus.textContent = '⏳ Запрашиваем камеру...';

                await new Promise(r => setTimeout(r, 300));

                try {
                    localStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { ideal: 'environment' } },
                        audio: false
                    });
                    localVideo.srcObject = localStream;
                    streamStatus.textContent = '🔗 Подключаемся к серверу...';

                    // На телефоне тоже пробуем серверы по очереди
                    createPeer(null, (newPeer, id) => {
                        peer = newPeer;
                        console.log('📱 Телефон готов, звоним на', remoteId);
                        const call = peer.call(remoteId, localStream);
                        currentCall = call;

                        call.on('close', () => {
                            console.log('📴 Звонок закрыт');
                            resetMobileToScanner('Соединение закрыто');
                        });

                        call.on('error', (err) => {
                            console.error('Ошибка звонка:', err);
                            resetMobileToScanner('Ошибка соединения');
                        });

                        streamStatus.textContent = '✅ Трансляция активна';
                    }, (errorMsg) => {
                        streamStatus.textContent = '❌ Ошибка сервера';
                        mobileInfo.textContent = errorMsg;
                    });
                } catch (err) {
                    console.error('Ошибка доступа к камере:', err);
                    streamStatus.textContent = '❌ Нет доступа к камере';
                    mobileInfo.textContent = 'Разрешите доступ к камере и попробуйте снова.';
                }
            }

            // ---------- Обработчики ручного ввода ----------
            manualConnectBtn.addEventListener('click', () => {
                stopScannerStream();
                mobileScanner.classList.add('hidden');
                manualConnectDiv.classList.remove('hidden');
            });

            backToScanner.addEventListener('click', () => {
                manualConnectDiv.classList.add('hidden');
                mobileScanner.classList.remove('hidden');
                initMobileScanner();
            });

            connectManualBtn.addEventListener('click', () => {
                const id = peerIdInput.value.trim();
                if (id) {
                    stopScannerStream();
                    startStreamingAndCall(id);
                } else {
                    alert('Введите ID');
                }
            });

            stopBtn.addEventListener('click', () => {
                resetMobileToScanner('Трансляция остановлена');
            });

            // ---------- Инициализация ----------
            function init() {
                if (isMobile) {
                    mobileView.classList.remove('hidden');
                    desktopView.classList.add('hidden');

                    const connectId = getConnectParam();
                    if (connectId) {
                        removeConnectParam();
                        startStreamingAndCall(connectId);
                    } else {
                        resetMobileToScanner('Готов к сканированию');
                    }
                } else {
                    desktopView.classList.remove('hidden');
                    mobileView.classList.add('hidden');
                    initDesktop();
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            window.addEventListener('beforeunload', () => {
                if (peer) peer.destroy();
                stopLocalStream();
                stopScannerStream();
            });
        })();
    </script>
</body>
</html>
