<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Телефон как веб-камера (QR всегда генерируется)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0b0f14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: #1e242b;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            padding: 24px;
            color: #f0f4f8;
        }
        h2 { font-weight: 600; margin-bottom: 16px; color: white; }
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 24px;
            display: inline-block;
            margin: 16px 0;
        }
        #qrcode { display: flex; justify-content: center; }
        .status {
            background: #2a333d;
            border-radius: 40px;
            padding: 12px 20px;
            margin: 16px 0;
            color: #99c2ff;
            font-weight: 500;
        }
        .video-container {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin: 16px 0;
            aspect-ratio: 16/9;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .scanner-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: #2c3e50;
            border-radius: 24px;
            overflow: hidden;
            margin: 16px 0;
            position: relative;
        }
        #preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn {
            background: #3a6ea5;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            max-width: 280px;
            margin: 8px auto;
            border: 1px solid #5f8bc9;
        }
        .btn:active { background: #2c4f7a; transform: scale(0.97); }
        .btn.danger { background: #b02e2e; border-color: #d66; }
        .hidden { display: none; }
        .info { color: #a0b3cc; font-size: 14px; margin-top: 16px; }
        .error { color: #ff9999; }
    </style>

    <!-- Библиотеки: старая версия PeerJS (минимум CORS) + jsQR + qrcode -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@0.3.20/dist/peer.min.js"></script>
</head>
<body>
    <div class="card">
        <!-- Компьютер (ПК) -->
        <div id="desktop-view" class="hidden">
            <h2>🖥️ Компьютер</h2>
            <p>Отсканируйте этот QR‑код камерой телефона</p>
            <div class="qr-container" id="qrcode"></div>
            <div class="status" id="desktop-status">Генерация кода...</div>
            <div id="desktop-video-box" class="video-container hidden">
                <video id="remote-video" autoplay playsinline></video>
            </div>
            <button class="btn" id="reset-desktop">🔄 Новый QR‑код</button>
            <div class="info" id="desktop-info"></div>
        </div>

        <!-- Телефон -->
        <div id="mobile-view" class="hidden">
            <h2 id="mobile-title">📱 Телефон</h2>
            <!-- Режим сканера -->
            <div id="mobile-scanner">
                <p>Наведите камеру на QR‑код с ПК</p>
                <div class="scanner-container">
                    <video id="preview" autoplay playsinline></video>
                </div>
                <div class="status" id="scanner-status">Сканирование...</div>
            </div>
            <!-- Режим трансляции -->
            <div id="mobile-streaming" class="hidden">
                <div class="video-container">
                    <video id="local-video" autoplay playsinline muted></video>
                </div>
                <div class="status" id="stream-status">🔴 Трансляция активна</div>
                <button class="btn danger" id="stop-stream">⏹️ Остановить и вернуться</button>
            </div>
            <div class="info" id="mobile-info"></div>
        </div>
    </div>

    <script>
        (function() {
            // Определение мобильного устройства
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            // DOM элементы
            const desktopView = document.getElementById('desktop-view');
            const mobileView = document.getElementById('mobile-view');
            const qrcodeDiv = document.getElementById('qrcode');
            const desktopStatus = document.getElementById('desktop-status');
            const desktopInfo = document.getElementById('desktop-info');
            const remoteVideo = document.getElementById('remote-video');
            const remoteVideoBox = document.getElementById('desktop-video-box');
            const resetBtn = document.getElementById('reset-desktop');

            const mobileScanner = document.getElementById('mobile-scanner');
            const mobileStreaming = document.getElementById('mobile-streaming');
            const mobileTitle = document.getElementById('mobile-title');
            const scannerStatus = document.getElementById('scanner-status');
            const preview = document.getElementById('preview');
            const localVideo = document.getElementById('local-video');
            const streamStatus = document.getElementById('stream-status');
            const stopBtn = document.getElementById('stop-stream');
            const mobileInfo = document.getElementById('mobile-info');

            // Общие переменные
            let peer = null;
            let currentCall = null;
            let localStream = null;       // поток с камеры телефона для трансляции
            let scannerStream = null;      // поток для сканера
            let scanInterval = null;       // интервал для jsQR
            let currentPeerId = null;      // ID пира на ПК

            // ---------- Вспомогательные функции ----------
            function stopScannerStream() {
                if (scannerStream) {
                    scannerStream.getTracks().forEach(track => track.stop());
                    scannerStream = null;
                }
                if (preview.srcObject) {
                    preview.srcObject = null;
                }
                if (scanInterval) {
                    clearInterval(scanInterval);
                    scanInterval = null;
                }
            }

            function stopLocalStream() {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
            }

            function resetMobileToScanner(reason) {
                if (currentCall) currentCall.close();
                if (peer) peer.destroy();
                stopLocalStream();
                peer = null;
                currentCall = null;

                mobileScanner.classList.remove('hidden');
                mobileStreaming.classList.add('hidden');
                mobileTitle.textContent = '📱 Телефон';
                scannerStatus.textContent = reason || 'Сканирование...';
                // запускаем сканер заново
                initMobileScanner();
            }

            // ---------- Параметры URL ----------
            function getConnectParam() {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('connect');
            }

            function removeConnectParam() {
                const url = new URL(window.location);
                url.searchParams.delete('connect');
                window.history.replaceState({}, document.title, url);
            }

            // ---------- ПК: генерация QR и создание Peer ----------
            function generateQRWithId(id) {
                qrcodeDiv.innerHTML = '';
                new QRCode(qrcodeDiv, {
                    text: `${window.location.origin}${window.location.pathname}?connect=${id}`,
                    width: 250,
                    height: 250,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }

            function initDesktop() {
                // Генерируем случайный ID (6 символов)
                currentPeerId = 'pc-' + Math.random().toString(36).substring(2, 8);
                desktopStatus.textContent = `ID: ${currentPeerId}`;
                generateQRWithId(currentPeerId);

                // Попытка подключиться к серверу PeerJS с этим ID
                if (peer) peer.destroy();
                // Используем старый облачный сервер
                peer = new Peer(currentPeerId, { host: '0.peerjs.com', port: 9000, path: '/' });

                peer.on('open', (id) => {
                    desktopInfo.textContent = '✅ Сервер доступен, ожидаем звонок...';
                });

                peer.on('call', (call) => {
                    console.log('📞 Входящий звонок');
                    desktopStatus.textContent = '📞 Входящий звонок...';
                    call.answer(); // отвечаем без отправки своего видео

                    call.on('stream', (remoteStream) => {
                        console.log('📹 Поток получен');
                        remoteVideoBox.classList.remove('hidden');
                        remoteVideo.srcObject = remoteStream;
                        remoteVideo.play().catch(e => console.warn('play error', e));
                        desktopStatus.textContent = '✅ Трансляция с телефона';
                        desktopInfo.textContent = '';
                    });

                    call.on('close', () => {
                        console.log('❌ Звонок закрыт');
                        remoteVideo.srcObject = null;
                        remoteVideoBox.classList.add('hidden');
                        desktopStatus.textContent = `ID: ${currentPeerId} (ожидание)`;
                        currentCall = null;
                    });

                    call.on('error', (err) => {
                        console.error('Ошибка звонка:', err);
                        remoteVideoBox.classList.add('hidden');
                        desktopStatus.textContent = 'Ошибка соединения';
                    });

                    currentCall = call;
                });

                peer.on('error', (err) => {
                    desktopInfo.innerHTML = `<span class="error">⚠️ Сервер PeerJS недоступен. Видеосвязь может не работать, но QR-код действителен.</span>`;
                    console.error(err);
                });
            }

            resetBtn.addEventListener('click', () => {
                if (peer) peer.destroy();
                if (currentCall) currentCall.close();
                remoteVideo.srcObject = null;
                remoteVideoBox.classList.add('hidden');
                initDesktop(); // сгенерирует новый ID и QR
            });

            // ---------- Телефон: сканер (jsQR) ----------
            async function initMobileScanner() {
                stopScannerStream();

                try {
                    scannerStream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' } // предпочитаем заднюю камеру
                    });
                    preview.srcObject = scannerStream;
                    await preview.play();

                    // Создаём скрытый canvas для анализа кадров
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    scannerStatus.textContent = 'Сканирование...';

                    scanInterval = setInterval(() => {
                        if (!preview.videoWidth) return;
                        canvas.width = preview.videoWidth;
                        canvas.height = preview.videoHeight;
                        ctx.drawImage(preview, 0, 0, canvas.width, canvas.height);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' });
                        if (code) {
                            const content = code.data;
                            scannerStatus.textContent = '✅ QR найден!';
                            try {
                                const url = new URL(content);
                                const connectId = url.searchParams.get('connect');
                                if (connectId) {
                                    stopScannerStream();
                                    startStreamingAndCall(connectId);
                                } else {
                                    scannerStatus.textContent = 'Неверный QR (нет ID)';
                                }
                            } catch (e) {
                                scannerStatus.textContent = 'Не является ссылкой';
                            }
                        }
                    }, 500);
                } catch (err) {
                    console.error('Ошибка доступа к камере:', err);
                    scannerStatus.textContent = 'Нет доступа к камере';
                    mobileInfo.textContent = 'Разрешите доступ к камере и перезагрузите страницу.';
                }
            }

            // ---------- Телефон: начало трансляции и звонок на ПК ----------
            async function startStreamingAndCall(remoteId) {
                stopScannerStream();
                mobileScanner.classList.add('hidden');
                mobileStreaming.classList.remove('hidden');
                streamStatus.textContent = '⏳ Запрашиваем камеру...';

                // Небольшая задержка для гарантии освобождения
                await new Promise(r => setTimeout(r, 300));

                try {
                    localStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { ideal: 'environment' } },
                        audio: false
                    });
                    localVideo.srcObject = localStream;
                    streamStatus.textContent = '🔗 Подключаемся...';

                    if (peer) peer.destroy();
                    peer = new Peer({ host: '0.peerjs.com', port: 9000, path: '/' });

                    peer.on('open', () => {
                        console.log('📱 Телефон готов, звоним на', remoteId);
                        const call = peer.call(remoteId, localStream);
                        currentCall = call;

                        call.on('close', () => {
                            console.log('📴 Звонок закрыт');
                            resetMobileToScanner('Соединение закрыто');
                        });

                        call.on('error', (err) => {
                            console.error('Ошибка звонка:', err);
                            resetMobileToScanner('Ошибка соединения');
                        });

                        streamStatus.textContent = '✅ Трансляция активна';
                    });

                    peer.on('error', (err) => {
                        console.error('Ошибка Peer:', err);
                        resetMobileToScanner('Ошибка Peer. Сервер недоступен.');
                    });
                } catch (err) {
                    console.error('Ошибка доступа к камере:', err);
                    streamStatus.textContent = '❌ Нет доступа к камере';
                    mobileInfo.textContent = 'Разрешите доступ к камере и попробуйте снова.';
                }
            }

            // Кнопка остановки на телефоне
            stopBtn.addEventListener('click', () => {
                resetMobileToScanner('Трансляция остановлена');
            });

            // ---------- Инициализация в зависимости от устройства ----------
            function init() {
                if (isMobile) {
                    mobileView.classList.remove('hidden');
                    desktopView.classList.add('hidden');

                    const connectId = getConnectParam();
                    if (connectId) {
                        removeConnectParam();
                        startStreamingAndCall(connectId);
                    } else {
                        resetMobileToScanner('Готов к сканированию');
                    }
                } else {
                    desktopView.classList.remove('hidden');
                    mobileView.classList.add('hidden');
                    initDesktop();
                }
            }

            // Запуск после загрузки DOM
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // Очистка при уходе со страницы
            window.addEventListener('beforeunload', () => {
                if (peer) peer.destroy();
                stopLocalStream();
                stopScannerStream();
            });
        })();
    </script>
</body>
</html>
