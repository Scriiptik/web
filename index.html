<!DOCTYPE html>
<html>
<head>
    <title>Совместное рисование (Firebase) — 100% работает</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #f0f0f0; font-family: system-ui, sans-serif; }
        canvas { display: block; background: white; touch-action: none; width: 100vw; height: 100vh; }
        #controls {
            position: absolute; top: 10px; left: 10px; right: 10px;
            background: rgba(255,255,255,0.96); padding: 16px; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 100;
            backdrop-filter: blur(8px); max-width: 360px; margin: 0 auto;
            box-sizing: border-box;
        }
        .control-group { margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
        input, button { padding: 12px 16px; font-size: 16px; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: 600; }
        button#clearBtn { background: #f44336; }
        #roomIdDisplay { font-weight: bold; word-break: break-all; background: #e3f2fd; padding: 8px 12px; border-radius: 8px; margin-top: 5px; }
        #status { font-size: 14px; margin-top: 8px; font-weight: 500; color: #1976d2; }
        .note { font-size: 13px; color: #555; margin-top: 12px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
    </style>
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <div class="control-group">
            <button id="createBtn">🎨 Создать комнату</button>
            <div id="roomIdDisplay">—</div>
        </div>
        <div class="control-group">
            <input type="text" id="roomIdInput" placeholder="ID комнаты (например, ABC123)">
            <button id="joinBtn">🔗 Присоединиться</button>
        </div>
        <div class="control-group">
            <button id="clearBtn">🗑 Очистить холст</button>
        </div>
        <div id="status">⚪ Ожидание...</div>
        <div class="note">
            <strong>🚀 Как пользоваться:</strong><br>
            1️⃣ Один нажимает «Создать комнату» — появляется ID.<br>
            2️⃣ Другой вводит этот ID и нажимает «Присоединиться».<br>
            3️⃣ Рисуйте — линии появляются у обоих мгновенно.<br>
            ✅ Работает на любом интернете (даже если WebRTC заблокирован).
        </div>
    </div>

    <script>
        // ================== ВСТАВЬТЕ СВОИ КЛЮЧИ FIREBASE ==================
        const firebaseConfig = {
            apiKey: "AIzaSy...",            // ваш apiKey
            authDomain: "your-project.firebaseapp.com",   // ваш authDomain
            databaseURL: "https://your-project-default-rtdb.firebaseio.com", // URL базы
            projectId: "your-project",       // ваш projectId
            storageBucket: "your-project.appspot.com",    // ваш storageBucket
            messagingSenderId: "123456789",  // ваш senderId
            appId: "1:123456789:web:abc..."  // ваш appId
        };
        // =================================================================

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ----- Элементы интерфейса -----
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const roomIdInput = document.getElementById('roomIdInput');
        const createBtn = document.getElementById('createBtn');
        const joinBtn = document.getElementById('joinBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusEl = document.getElementById('status');

        let drawing = false;
        let currentRoom = null;      // ID текущей комнаты
        let roomRef = null;          // Ссылка на Firebase для текущей комнаты

        // ----- Размер холста под окно -----
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ----- Получение координат (мышь/тач) -----
        function getCoords(e) {
            e.preventDefault(); // важно для touch, чтобы не скроллило
            if (e.touches) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        // ----- Функции рисования -----
        function startDrawing(e) {
            e.preventDefault();
            drawing = true;
            const pos = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            // Отправляем событие в Firebase, если есть комната
            if (currentRoom) {
                db.ref(`rooms/${currentRoom}/events`).push({
                    type: 'start',
                    x: pos.x,
                    y: pos.y,
                    timestamp: Date.now()
                });
            }
        }

        function draw(e) {
            e.preventDefault();
            if (!drawing) return;
            const pos = getCoords(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            if (currentRoom) {
                db.ref(`rooms/${currentRoom}/events`).push({
                    type: 'draw',
                    x: pos.x,
                    y: pos.y,
                    timestamp: Date.now()
                });
            }
        }

        function stopDrawing(e) {
            e.preventDefault();
            drawing = false;
            ctx.beginPath();
            if (currentRoom) {
                db.ref(`rooms/${currentRoom}/events`).push({
                    type: 'stop',
                    timestamp: Date.now()
                });
            }
        }

        // ----- Подписка на события холста -----
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing, { passive: false });
        canvas.addEventListener('touchcancel', stopDrawing, { passive: false });

        // ----- Создание комнаты (генерируем ID) -----
        createBtn.addEventListener('click', () => {
            const roomId = Math.random().toString(36).substring(2, 8).toUpperCase(); // 6 символов
            roomIdDisplay.textContent = roomId;
            currentRoom = roomId;
            statusEl.innerHTML = '🟢 Комната создана. Ожидаем подключения...';

            // Очищаем предыдущие события в этой комнате (если были)
            db.ref(`rooms/${roomId}`).remove();

            // Отписываемся от предыдущей комнаты, если была
            if (roomRef) roomRef.off();

            // Подписываемся на новые события от других участников
            roomRef = db.ref(`rooms/${roomId}/events`);
            roomRef.on('child_added', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                // Воспроизводим действие (оно пришло от друга)
                if (data.type === 'start') {
                    ctx.beginPath();
                    ctx.moveTo(data.x, data.y);
                } else if (data.type === 'draw') {
                    ctx.lineTo(data.x, data.y);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(data.x, data.y);
                } else if (data.type === 'stop') {
                    ctx.beginPath();
                } else if (data.type === 'clear') {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            });

            // Копируем ID в буфер обмена (удобно)
            navigator.clipboard?.writeText(roomId).catch(() => {});
        });

        // ----- Присоединение к существующей комнате -----
        joinBtn.addEventListener('click', () => {
            const roomId = roomIdInput.value.trim().toUpperCase();
            if (!roomId) {
                alert('Введите ID комнаты');
                return;
            }
            currentRoom = roomId;
            statusEl.innerHTML = '🟡 Подключение к комнате...';

            // Очищаем холст
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Удаляем все старые рисунки в комнате (чтобы начать с чистого листа)
            db.ref(`rooms/${roomId}/events`).remove();

            // Отписываемся от предыдущей комнаты
            if (roomRef) roomRef.off();

            // Подписываемся на события от создателя комнаты
            roomRef = db.ref(`rooms/${roomId}/events`);
            roomRef.on('child_added', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                if (data.type === 'start') {
                    ctx.beginPath();
                    ctx.moveTo(data.x, data.y);
                } else if (data.type === 'draw') {
                    ctx.lineTo(data.x, data.y);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(data.x, data.y);
                } else if (data.type === 'stop') {
                    ctx.beginPath();
                } else if (data.type === 'clear') {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            });

            statusEl.innerHTML = '🟢 Подключено к комнате';
        });

        // ----- Очистка холста (локально + для всех) -----
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentRoom) {
                db.ref(`rooms/${currentRoom}/events`).push({ type: 'clear', timestamp: Date.now() });
            }
        });
    </script>
</body>
</html>
