    <script>
        (function() {
            // -------------------------------------------------------------
            // 1. Конфигурация Firebase (ваши данные)
            // -------------------------------------------------------------
            const firebaseConfig = {
                apiKey: "AIzaSyBw-Jv_Kp6UijGT4giu1DCO-kAXtlU-y5w",
                authDomain: "webs-a50d2.firebaseapp.com",
                projectId: "webs-a50d2",
                storageBucket: "webs-a50d2.firebasestorage.app",
                messagingSenderId: "615777470967",
                appId: "1:615777470967:web:9b35c8edd98f6925bc06f2",
                measurementId: "G-P1FY1HJDTK"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            const storage = firebase.storage();
            const analytics = firebase.analytics();

            // -------------------------------------------------------------
            // 2. Глобальные переменные
            // -------------------------------------------------------------
            let currentUser = null;
            let currentUserProfile = null;
            let currentFollowees = [];
            let unsubscribeFeed = null;
            let unsubscribeProfilePosts = null;
            let unsubscribeFollows = null;
            let unsubscribeChats = null;
            let unsubscribeMessages = null;
            let viewingProfileUid = null;
            let currentChatId = null;
            let currentChatParticipant = null;

            // Для записи голоса
            let mediaRecorder = null;
            let audioChunks = [];
            let isRecording = false;

            // Тема
            let darkTheme = localStorage.getItem('theme') === 'dark';

            // Для модалки друга
            let selectedFriendUid = null;

            // -------------------------------------------------------------
            // 3. DOM-элементы
            // -------------------------------------------------------------
            const authContainer = document.getElementById('authContainer');
            const appContainer = document.getElementById('appContainer');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginBtn = document.getElementById('loginBtn');
            const registerBtn = document.getElementById('registerBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const headerEmail = document.getElementById('headerEmail');
            const themeToggle = document.getElementById('themeToggle');

            // Навигация через бургер
            const burgerMenu = document.getElementById('burgerMenu');
            const navDrawer = document.getElementById('navDrawer');
            const overlay = document.getElementById('overlay');
            const closeDrawer = document.getElementById('closeDrawer');
            const drawerFeed = document.getElementById('drawerFeed');
            const drawerProfile = document.getElementById('drawerProfile');
            const drawerSearch = document.getElementById('drawerSearch');

            const feedSection = document.getElementById('feedSection');
            const profileSection = document.getElementById('profileSection');
            const searchSection = document.getElementById('searchSection');
            const chatsSection = document.getElementById('chatsSection');

            const postText = document.getElementById('postText');
            const createPostBtn = document.getElementById('createPostBtn');
            const feedPosts = document.getElementById('feedPosts');

            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const searchResults = document.getElementById('searchResults');

            // Элементы чатов
            const chatsSidebar = document.getElementById('chatsSidebar');
            const chatSearchInput = document.getElementById('chatSearchInput');
            const chatsList = document.getElementById('chatsList');
            const chatWindowContainer = document.getElementById('chatWindowContainer');
            const noChatSelected = document.getElementById('noChatSelected');
            const messagesContainer = document.getElementById('messagesContainer');
            const messageInput = document.getElementById('messageInput');
            const sendMessageBtn = document.getElementById('sendMessageBtn');
            const emojiBtn = document.getElementById('emojiBtn');
            const attachBtn = document.getElementById('attachBtn');
            const fileInput = document.getElementById('fileInput');
            const recordBtn = document.getElementById('recordBtn');
            const emojiPicker = document.getElementById('emojiPicker');
            const chatHeader = document.getElementById('chatHeader');
            const backFromChatBtn = document.getElementById('backFromChatBtn');

            // Модалка друга
            const friendModal = document.getElementById('friendModal');
            const friendModalName = document.getElementById('friendModalName');
            const modalMessageBtn = document.getElementById('modalMessageBtn');
            const modalProfileBtn = document.getElementById('modalProfileBtn');
            const modalCloseBtn = document.getElementById('modalCloseBtn');

            // -------------------------------------------------------------
            // 4. Тема
            // -------------------------------------------------------------
            function applyTheme() {
                if (darkTheme) {
                    document.body.classList.add('dark-theme');
                    themeToggle.textContent = '☀️';
                } else {
                    document.body.classList.remove('dark-theme');
                    themeToggle.textContent = '🌙';
                }
                localStorage.setItem('theme', darkTheme ? 'dark' : 'light');
            }
            applyTheme();
            themeToggle.addEventListener('click', () => {
                darkTheme = !darkTheme;
                applyTheme();
            });

            // -------------------------------------------------------------
            // 5. Управление бургер-меню
            // -------------------------------------------------------------
            function openDrawer() {
                navDrawer.classList.add('open');
                overlay.classList.add('show');
            }
            function closeDrawerFn() {
                navDrawer.classList.remove('open');
                overlay.classList.remove('show');
            }
            burgerMenu.addEventListener('click', openDrawer);
            closeDrawer.addEventListener('click', closeDrawerFn);
            overlay.addEventListener('click', closeDrawerFn);

            // Навигация по пунктам меню
            function showSectionOnly(section) {
                // Скрываем все секции
                feedSection.classList.remove('active');
                profileSection.classList.remove('active');
                searchSection.classList.remove('active');
                chatsSection.classList.remove('active');
                // Показываем нужную
                if (section === 'feed') feedSection.classList.add('active');
                if (section === 'profile') profileSection.classList.add('active');
                if (section === 'search') searchSection.classList.add('active');
                if (section === 'chats') chatsSection.classList.add('active');
                closeDrawerFn();
            }

            drawerFeed.addEventListener('click', () => {
                showSectionOnly('feed');
                // Если мы были в чате, скрываем окно чата
                chatWindowContainer.classList.add('hidden');
                noChatSelected.classList.remove('hidden');
                currentChatId = null;
                if (unsubscribeMessages) unsubscribeMessages();
                loadFeed();
            });
            drawerProfile.addEventListener('click', () => {
                showSectionOnly('profile');
                viewingProfileUid = currentUser.uid;
                loadProfile(viewingProfileUid);
            });
            drawerSearch.addEventListener('click', () => {
                showSectionOnly('search');
                searchResults.innerHTML = '';
            });

            // При загрузке показываем чаты по умолчанию
            function goToChats() {
                showSectionOnly('chats');
                chatWindowContainer.classList.add('hidden');
                noChatSelected.classList.remove('hidden');
                currentChatId = null;
                loadChats();
            }

            // -------------------------------------------------------------
            // 6. Работа с Firestore (профили, подписки, посты, лайки)
            // -------------------------------------------------------------
            async function ensureUserProfile(user) {
                if (!user) return;
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                if (!doc.exists) {
                    await userRef.set({
                        email: user.email,
                        displayName: user.email.split('@')[0],
                        bio: '',
                        avatar: '',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                userRef.onSnapshot((snap) => {
                    if (snap.exists) {
                        currentUserProfile = snap.data();
                        headerEmail.textContent = currentUserProfile.displayName || currentUser.email;
                    }
                });
            }

            function loadFeed() {
                if (!currentUser) return;
                const followsQuery = db.collection('follows').where('followerId', '==', currentUser.uid);
                unsubscribeFollows = followsQuery.onSnapshot(async (snapshot) => {
                    const followees = snapshot.docs.map(doc => doc.data().followeeId);
                    currentFollowees = followees;
                    if (followees.length === 0) {
                        feedPosts.innerHTML = '<div class="info-message">Вы ещё ни на кого не подписались. Найдите интересных авторов в поиске!</div>';
                        return;
                    }
                    const chunk = followees.slice(0, 10);
                    const postsQuery = db.collection('posts')
                        .where('userId', 'in', chunk)
                        .orderBy('timestamp', 'desc');
                    
                    if (unsubscribeFeed) unsubscribeFeed();
                    unsubscribeFeed = postsQuery.onSnapshot((postsSnap) => {
                        renderFeed(postsSnap.docs);
                    }, (error) => {
                        console.error('Ошибка ленты:', error);
                        feedPosts.innerHTML = `<div class="info-message">Ошибка загрузки ленты: ${error.message}. Возможно, требуется создать индекс.</div>`;
                    });
                });
            }

            async function renderFeed(postsDocs) {
                if (postsDocs.length === 0) {
                    feedPosts.innerHTML = '<div class="info-message">В ленте пока нет постов.</div>';
                    return;
                }
                const authorIds = [...new Set(postsDocs.map(d => d.data().userId))];
                const authorPromises = authorIds.map(uid => db.collection('users').doc(uid).get());
                const authorSnaps = await Promise.all(authorPromises);
                const authors = {};
                authorSnaps.forEach(snap => {
                    if (snap.exists) authors[snap.id] = snap.data();
                });

                let html = '';
                postsDocs.forEach(doc => {
                    const post = doc.data();
                    const author = authors[post.userId] || { displayName: 'Неизвестный', email: '' };
                    const time = post.timestamp ? new Date(post.timestamp.toDate()).toLocaleString() : 'только что';
                    const likesCount = post.likes ? post.likes.length : 0;
                    const userLiked = post.likes && post.likes.includes(currentUser.uid);
                    html += `
                        <div class="post card" data-post-id="${doc.id}">
                            <div class="post-header">
                                <div class="post-author">${author.displayName || author.email}</div>
                                <div class="post-time">${time}</div>
                            </div>
                            <div class="post-text">${post.text.replace(/</g, '&lt;')}</div>
                            <div class="post-actions">
                                <button class="like-btn ${userLiked ? 'liked' : ''}" data-post-id="${doc.id}">
                                    ❤️ <span class="likes-count">${likesCount}</span>
                                </button>
                            </div>
                        </div>
                    `;
                });
                feedPosts.innerHTML = html;
                feedPosts.querySelectorAll('.like-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleLike(btn.dataset.postId);
                    });
                });
            }

            async function toggleLike(postId) {
                if (!currentUser) return;
                const postRef = db.collection('posts').doc(postId);
                const post = await postRef.get();
                if (!post.exists) return;
                const likes = post.data().likes || [];
                if (likes.includes(currentUser.uid)) {
                    await postRef.update({
                        likes: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                    });
                } else {
                    await postRef.update({
                        likes: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                    });
                }
            }

            async function loadProfile(uid) {
                if (!uid) return;
                const profileContainer = document.getElementById('profileContainer');
                profileContainer.innerHTML = '<div class="info-message">Загрузка...</div>';

                const userDoc = await db.collection('users').doc(uid).get();
                if (!userDoc.exists) {
                    profileContainer.innerHTML = '<div class="info-message">Пользователь не найден</div>';
                    return;
                }
                const userData = userDoc.data();

                if (unsubscribeProfilePosts) unsubscribeProfilePosts();
                const postsQuery = db.collection('posts')
                    .where('userId', '==', uid)
                    .orderBy('timestamp', 'desc');
                unsubscribeProfilePosts = postsQuery.onSnapshot(async (postsSnap) => {
                    const followersCount = (await db.collection('follows').where('followeeId', '==', uid).get()).size;
                    const followingCount = (await db.collection('follows').where('followerId', '==', uid).get()).size;

                    let isFollowing = false;
                    if (currentUser && uid !== currentUser.uid) {
                        const followDoc = await db.collection('follows').doc(`${currentUser.uid}_${uid}`).get();
                        isFollowing = followDoc.exists;
                    }

                    let friends = [];
                    if (uid === currentUser.uid) {
                        const followersSnap = await db.collection('follows').where('followeeId', '==', uid).get();
                        const followers = followersSnap.docs.map(d => d.data().followerId);
                        const followeesSnap = await db.collection('follows').where('followerId', '==', uid).get();
                        const followees = followeesSnap.docs.map(d => d.data().followeeId);
                        const mutual = followers.filter(id => followees.includes(id));
                        const friendDocs = await Promise.all(mutual.map(id => db.collection('users').doc(id).get()));
                        friends = friendDocs.map(doc => ({ uid: doc.id, ...doc.data() }));
                    }

                    renderProfile(uid, userData, postsSnap.docs, followersCount, followingCount, isFollowing, friends);
                }, (error) => {
                    console.error('Ошибка загрузки постов профиля:', error);
                    profileContainer.innerHTML = `<div class="info-message">Ошибка загрузки постов: ${error.message}</div>`;
                });
            }

            function renderProfile(uid, userData, postsDocs, followersCount, followingCount, isFollowing, friends = []) {
                const profileContainer = document.getElementById('profileContainer');
                const isOwnProfile = (currentUser && uid === currentUser.uid);
                const avatarLetter = (userData.displayName || userData.email || '?')[0].toUpperCase();

                let postsHtml = '';
                postsDocs.forEach(doc => {
                    const post = doc.data();
                    const time = post.timestamp ? new Date(post.timestamp.toDate()).toLocaleString() : 'только что';
                    const likesCount = post.likes ? post.likes.length : 0;
                    const userLiked = post.likes && post.likes.includes(currentUser.uid);
                    postsHtml += `
                        <div class="post" data-post-id="${doc.id}">
                            <div class="post-header">
                                <div class="post-time">${time}</div>
                            </div>
                            <div class="post-text">${post.text.replace(/</g, '&lt;')}</div>
                            <div class="post-actions">
                                <button class="like-btn ${userLiked ? 'liked' : ''}" data-post-id="${doc.id}">
                                    ❤️ <span class="likes-count">${likesCount}</span>
                                </button>
                            </div>
                        </div>
                    `;
                });

                const avatarHtml = userData.avatar 
                    ? `<img src="${userData.avatar}" class="avatar-img" alt="avatar">`
                    : avatarLetter;

                const followButton = !isOwnProfile ? `
                    <button class="follow-btn ${isFollowing ? 'secondary' : ''}" data-follow-uid="${uid}">
                        ${isFollowing ? '✓ Отписаться' : '+ Подписаться'}
                    </button>
                ` : '';

                const messageButton = !isOwnProfile ? `
                    <button class="secondary" id="messageUserBtn" data-uid="${uid}">✉ Написать сообщение</button>
                ` : '';

                const editButton = isOwnProfile ? '<button id="editProfileBtn" class="secondary">✎ Редактировать профиль</button>' : '';

                let friendsHtml = '';
                if (isOwnProfile && friends.length > 0) {
                    friendsHtml = `
                        <div class="card">
                            <h3>Друзья (взаимные подписки)</h3>
                            <div class="friends-list">
                                ${friends.map(f => `
                                    <div class="friend-item" data-uid="${f.uid}">
                                        <div class="friend-avatar">${f.avatar ? `<img src="${f.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : (f.displayName || f.email || '?')[0].toUpperCase()}</div>
                                        <span class="friend-name">${f.displayName || f.email}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else if (isOwnProfile) {
                    friendsHtml = '<div class="info-message">У вас пока нет друзей (взаимных подписок).</div>';
                }

                profileContainer.innerHTML = `
                    <div class="card">
                        <div class="profile-header">
                            <div class="avatar">${avatarHtml}</div>
                            <div class="profile-info">
                                <h2>${userData.displayName || 'Без имени'}</h2>
                                <p>${userData.bio || 'Пока ничего не рассказано о себе.'}</p>
                                <div class="stats">
                                    <div><span>${followersCount}</span> подписчиков</div>
                                    <div><span>${followingCount}</span> подписок</div>
                                </div>
                                <div><small>ID: ${uid}</small></div>
                                <div class="flex-row" style="margin-top:1rem;">
                                    ${followButton}
                                    ${messageButton}
                                    ${editButton}
                                </div>
                            </div>
                        </div>
                    </div>
                    ${friendsHtml}
                    <div class="card">
                        <h3 style="margin-bottom:1rem;">Посты пользователя</h3>
                        ${postsHtml || '<p class="info-message">Пока нет постов.</p>'}
                    </div>
                `;

                if (!isOwnProfile) {
                    const followBtn = profileContainer.querySelector('.follow-btn');
                    if (followBtn) {
                        followBtn.addEventListener('click', () => toggleFollow(uid, isFollowing));
                    }
                    const messageBtn = profileContainer.querySelector('#messageUserBtn');
                    if (messageBtn) {
                        messageBtn.addEventListener('click', () => openChatWithUser(uid));
                    }
                } else {
                    const editBtn = document.getElementById('editProfileBtn');
                    if (editBtn) editBtn.addEventListener('click', showEditProfileForm);
                    // Обработка клика по друзьям (показываем модалку)
                    profileContainer.querySelectorAll('.friend-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const friendUid = item.dataset.uid;
                            // Получаем имя друга для отображения в модалке
                            db.collection('users').doc(friendUid).get().then(doc => {
                                if (doc.exists) {
                                    const friendData = doc.data();
                                    selectedFriendUid = friendUid;
                                    friendModalName.textContent = friendData.displayName || friendData.email || 'Друг';
                                    friendModal.classList.add('show');
                                }
                            });
                        });
                    });
                }

                profileContainer.querySelectorAll('.like-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleLike(btn.dataset.postId);
                    });
                });
            }

            // Обработка модалки
            modalMessageBtn.addEventListener('click', () => {
                if (selectedFriendUid) {
                    openChatWithUser(selectedFriendUid);
                    friendModal.classList.remove('show');
                }
            });
            modalProfileBtn.addEventListener('click', () => {
                if (selectedFriendUid) {
                    goToUserProfile(selectedFriendUid);
                    friendModal.classList.remove('show');
                }
            });
            modalCloseBtn.addEventListener('click', () => {
                friendModal.classList.remove('show');
            });
            // Закрыть по клику вне модалки
            friendModal.addEventListener('click', (e) => {
                if (e.target === friendModal) {
                    friendModal.classList.remove('show');
                }
            });

            async function toggleFollow(targetUid, currentlyFollowing) {
                if (!currentUser) return;
                const followId = `${currentUser.uid}_${targetUid}`;
                const followRef = db.collection('follows').doc(followId);
                if (currentlyFollowing) {
                    await followRef.delete();
                } else {
                    await followRef.set({
                        followerId: currentUser.uid,
                        followeeId: targetUid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            }

            function showEditProfileForm() {
                if (!currentUserProfile) return;
                const profileContainer = document.getElementById('profileContainer');
                profileContainer.innerHTML = `
                    <div class="card edit-form">
                        <h3>Редактировать профиль</h3>
                        <div class="input-group">
                            <label>Имя</label>
                            <input type="text" id="editName" value="${currentUserProfile.displayName || ''}">
                        </div>
                        <div class="input-group">
                            <label>О себе</label>
                            <textarea id="editBio" rows="3">${currentUserProfile.bio || ''}</textarea>
                        </div>
                        <div class="input-group">
                            <label>Фото профиля</label>
                            <input type="file" id="avatarUpload" accept="image/*">
                        </div>
                        <div class="flex-row">
                            <button id="saveProfileBtn">Сохранить</button>
                            <button id="cancelEditBtn" class="secondary">Отмена</button>
                        </div>
                    </div>
                `;
                document.getElementById('saveProfileBtn').addEventListener('click', saveProfile);
                document.getElementById('cancelEditBtn').addEventListener('click', () => loadProfile(currentUser.uid));
                document.getElementById('avatarUpload').addEventListener('change', uploadAvatar);
            }

            async function uploadAvatar(e) {
                const file = e.target.files[0];
                if (!file) return;
                const storageRef = storage.ref(`avatars/${currentUser.uid}`);
                await storageRef.put(file);
                const url = await storageRef.getDownloadURL();
                await db.collection('users').doc(currentUser.uid).update({ avatar: url });
                loadProfile(currentUser.uid);
            }

            async function saveProfile() {
                const newName = document.getElementById('editName').value.trim();
                const newBio = document.getElementById('editBio').value.trim();
                if (!newName) return alert('Имя не может быть пустым');
                await db.collection('users').doc(currentUser.uid).update({
                    displayName: newName,
                    bio: newBio
                });
                loadProfile(currentUser.uid);
            }

            // -------------------------------------------------------------
            // 7. Поиск пользователей
            // -------------------------------------------------------------
            async function searchUsers(query) {
                if (!query.trim()) {
                    searchResults.innerHTML = '<div class="info-message">Введите имя или email</div>';
                    return;
                }
                searchResults.innerHTML = '<div class="info-message">Поиск...</div>';
                const nameQuery = db.collection('users')
                    .orderBy('displayName')
                    .startAt(query)
                    .endAt(query + '\uf8ff');
                const emailQuery = db.collection('users')
                    .orderBy('email')
                    .startAt(query)
                    .endAt(query + '\uf8ff');
                
                try {
                    const [nameSnap, emailSnap] = await Promise.all([nameQuery.get(), emailQuery.get()]);
                    const usersMap = new Map();
                    nameSnap.docs.forEach(doc => usersMap.set(doc.id, doc.data()));
                    emailSnap.docs.forEach(doc => usersMap.set(doc.id, doc.data()));

                    if (usersMap.size === 0) {
                        searchResults.innerHTML = '<div class="info-message">Ничего не найдено</div>';
                        return;
                    }

                    const followees = currentFollowees || [];
                    let html = '';
                    for (let [uid, data] of usersMap.entries()) {
                        if (uid === currentUser.uid) continue;
                        const isFollowing = followees.includes(uid);
                        const avatarLetter = (data.displayName || data.email || '?')[0].toUpperCase();
                        const avatarHtml = data.avatar 
                            ? `<img src="${data.avatar}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">`
                            : avatarLetter;
                        html += `
                            <div class="user-card">
                                <div class="info">
                                    <div class="mini-avatar">${avatarHtml}</div>
                                    <div>
                                        <h4 class="user-name-link" data-uid="${uid}">${data.displayName || 'Без имени'}</h4>
                                        <small>${data.email}</small>
                                        <p>${data.bio ? data.bio.substring(0,60) : ''}</p>
                                    </div>
                                </div>
                                <div>
                                    <button class="follow-btn ${isFollowing ? 'secondary' : ''}" data-follow-uid="${uid}">
                                        ${isFollowing ? 'Отписаться' : 'Подписаться'}
                                    </button>
                                    <button class="secondary" style="margin-left:0.5rem;" data-message-uid="${uid}">✉</button>
                                </div>
                            </div>
                        `;
                    }
                    searchResults.innerHTML = html;

                    searchResults.querySelectorAll('.follow-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const targetUid = btn.dataset.followUid;
                            const isFollowing = btn.classList.contains('secondary');
                            await toggleFollow(targetUid, isFollowing);
                            searchUsers(searchInput.value);
                        });
                    });
                    searchResults.querySelectorAll('[data-message-uid]').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const uid = btn.dataset.messageUid;
                            openChatWithUser(uid);
                        });
                    });
                    searchResults.querySelectorAll('.user-name-link').forEach(span => {
                        span.addEventListener('click', () => {
                            const uid = span.dataset.uid;
                            goToUserProfile(uid);
                        });
                    });
                } catch (error) {
                    console.error('Ошибка поиска:', error);
                    searchResults.innerHTML = `<div class="info-message">Ошибка: ${error.message}</div>`;
                }
            }

            // -------------------------------------------------------------
            // 8. Создание поста
            // -------------------------------------------------------------
            async function createPost() {
                const text = postText.value.trim();
                if (!text) return alert('Напишите что-нибудь');
                await db.collection('posts').add({
                    userId: currentUser.uid,
                    text: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: []
                });
                postText.value = '';
            }

            // -------------------------------------------------------------
            // 9. Функции для чатов (с медиа)
            // -------------------------------------------------------------
            async function getOrCreateChat(otherUid) {
                const currentUid = currentUser.uid;
                const chatsRef = db.collection('chats');
                const snapshot = await chatsRef
                    .where('participants', 'array-contains', currentUid)
                    .get();
                let chat = null;
                snapshot.forEach(doc => {
                    const participants = doc.data().participants;
                    if (participants.includes(otherUid)) {
                        chat = { id: doc.id, ...doc.data() };
                    }
                });
                if (!chat) {
                    const newChatRef = await chatsRef.add({
                        participants: [currentUid, otherUid],
                        lastMessage: '',
                        lastMessageTimestamp: null,
                        lastMessageSender: null,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    chat = { id: newChatRef.id, participants: [currentUid, otherUid] };
                }
                return chat;
            }

            async function openChatWithUser(otherUid) {
                const chat = await getOrCreateChat(otherUid);
                currentChatId = chat.id;
                const userDoc = await db.collection('users').doc(otherUid).get();
                currentChatParticipant = { uid: otherUid, ...userDoc.data() };
                // Переключаемся на секцию чатов
                showSectionOnly('chats');
                chatWindowContainer.classList.remove('hidden');
                noChatSelected.classList.add('hidden');
                chatHeader.textContent = `Чат с ${currentChatParticipant.displayName || currentChatParticipant.email}`;
                loadMessages(chat.id);
                loadChats(); // обновить список чатов
                // выделяем активный чат в списке
                document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
                const activeItem = document.querySelector(`.chat-item[data-chat-id="${chat.id}"]`);
                if (activeItem) activeItem.classList.add('active');
            }

            function loadChats() {
                if (!currentUser) return;
                const chatsQuery = db.collection('chats')
                    .where('participants', 'array-contains', currentUser.uid)
                    .orderBy('updatedAt', 'desc');
                unsubscribeChats = chatsQuery.onSnapshot(async (snapshot) => {
                    const chatPromises = snapshot.docs.map(async (doc) => {
                        const chat = { id: doc.id, ...doc.data() };
                        const otherUid = chat.participants.find(uid => uid !== currentUser.uid);
                        const userDoc = await db.collection('users').doc(otherUid).get();
                        const userData = userDoc.data() || { displayName: 'Пользователь', email: '' };
                        return { ...chat, otherUser: { uid: otherUid, ...userData } };
                    });
                    const chats = await Promise.all(chatPromises);
                    renderChatsList(chats);
                }, (error) => {
                    console.error('Ошибка загрузки чатов:', error);
                    chatsList.innerHTML = `<div class="info-message">Ошибка загрузки чатов: ${error.message}</div>`;
                });
            }

            function renderChatsList(chats) {
                if (chats.length === 0) {
                    chatsList.innerHTML = '<div class="info-message">У вас пока нет чатов. Напишите кому-нибудь из поиска!</div>';
                    return;
                }
                let html = '';
                chats.forEach(chat => {
                    const lastMessage = chat.lastMessage || 'Нет сообщений';
                    const time = chat.lastMessageTimestamp ? new Date(chat.lastMessageTimestamp.toDate()).toLocaleString() : '';
                    const avatarLetter = (chat.otherUser.displayName || chat.otherUser.email || '?')[0].toUpperCase();
                    const avatarHtml = chat.otherUser.avatar 
                        ? `<img src="${chat.otherUser.avatar}" style="width:54px;height:54px;border-radius:50%;object-fit:cover;">`
                        : avatarLetter;
                    html += `
                        <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" data-chat-id="${chat.id}" data-other-uid="${chat.otherUser.uid}">
                            <div class="chat-avatar">${avatarHtml}</div>
                            <div class="chat-info">
                                <div class="chat-name">${chat.otherUser.displayName || chat.otherUser.email}</div>
                                <div class="chat-last-message">${lastMessage}</div>
                            </div>
                            <div class="chat-time">${time}</div>
                        </div>
                    `;
                });
                chatsList.innerHTML = html;
                chatsList.querySelectorAll('.chat-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const chatId = item.dataset.chatId;
                        const otherUid = item.dataset.otherUid;
                        currentChatId = chatId;
                        db.collection('users').doc(otherUid).get().then(doc => {
                            currentChatParticipant = { uid: otherUid, ...doc.data() };
                        });
                        chatWindowContainer.classList.remove('hidden');
                        noChatSelected.classList.add('hidden');
                        chatHeader.textContent = `Чат с ${currentChatParticipant?.displayName || ''}`;
                        loadMessages(chatId);
                        // выделить активный чат
                        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                    });
                });
            }

            function loadMessages(chatId) {
                if (unsubscribeMessages) unsubscribeMessages();
                const messagesQuery = db.collection('messages')
                    .where('chatId', '==', chatId)
                    .orderBy('timestamp', 'asc');
                unsubscribeMessages = messagesQuery.onSnapshot((snapshot) => {
                    const messages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderMessages(messages);
                }, (error) => {
                    console.error('Ошибка загрузки сообщений:', error);
                    messagesContainer.innerHTML = `<div class="info-message">Ошибка загрузки сообщений: ${error.message}</div>`;
                });
            }

            function renderMessages(messages) {
                if (messages.length === 0) {
                    messagesContainer.innerHTML = '<div class="info-message">Нет сообщений. Напишите первое!</div>';
                    return;
                }
                let html = '';
                messages.forEach(msg => {
                    const isOwn = msg.senderId === currentUser.uid;
                    const senderName = isOwn ? 'Вы' : (currentChatParticipant?.displayName || 'Собеседник');
                    const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString() : '';
                    let mediaHtml = '';
                    if (msg.mediaURL) {
                        if (msg.mediaType === 'image') {
                            mediaHtml = `<img src="${msg.mediaURL}" class="message-media" onclick="window.open(this.src)">`;
                        } else if (msg.mediaType === 'audio') {
                            mediaHtml = `<audio controls src="${msg.mediaURL}" class="message-audio"></audio>`;
                        } else if (msg.mediaType === 'video') {
                            mediaHtml = `<video controls src="${msg.mediaURL}" class="message-media"></video>`;
                        }
                    }
                    html += `
                        <div class="message ${isOwn ? 'own' : ''}">
                            <div class="message-sender">${senderName}</div>
                            <div>${msg.text ? msg.text.replace(/</g, '&lt;') : ''}</div>
                            ${mediaHtml}
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                });
                messagesContainer.innerHTML = html;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            async function sendMessage(text = null, mediaURL = null, mediaType = null) {
                const messageText = text !== null ? text : messageInput.value.trim();
                if (!messageText && !mediaURL) return;
                const message = {
                    chatId: currentChatId,
                    senderId: currentUser.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    read: false
                };
                if (messageText) message.text = messageText;
                if (mediaURL) {
                    message.mediaURL = mediaURL;
                    message.mediaType = mediaType;
                }
                await db.collection('messages').add(message);
                // Обновить lastMessage в чате
                await db.collection('chats').doc(currentChatId).update({
                    lastMessage: messageText || (mediaType === 'image' ? '📷 Фото' : mediaType === 'audio' ? '🎤 Голосовое' : mediaType === 'video' ? '🎥 Видео' : 'Медиа'),
                    lastMessageTimestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    lastMessageSender: currentUser.uid,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                if (!mediaURL) messageInput.value = '';
            }

            // -------------------------------------------------------------
            // 10. Медиа (изображения, видео, голос)
            // -------------------------------------------------------------
            attachBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file || !currentChatId) return;
                const isImage = file.type.startsWith('image/');
                const isVideo = file.type.startsWith('video/');
                if (!isImage && !isVideo) {
                    alert('Можно загружать только изображения и видео');
                    return;
                }
                const storageRef = storage.ref(`chats/${currentChatId}/${Date.now()}_${file.name}`);
                const snapshot = await storageRef.put(file);
                const url = await snapshot.ref.getDownloadURL();
                await sendMessage(null, url, isImage ? 'image' : 'video');
                fileInput.value = '';
            });

            // Запись голоса
            recordBtn.addEventListener('click', async () => {
                if (!currentChatId) return;
                if (!isRecording) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        mediaRecorder = new MediaRecorder(stream);
                        audioChunks = [];
                        mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                        mediaRecorder.onstop = async () => {
                            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                            const storageRef = storage.ref(`chats/${currentChatId}/${Date.now()}_voice.webm`);
                            const snapshot = await storageRef.put(audioBlob);
                            const url = await snapshot.ref.getDownloadURL();
                            await sendMessage(null, url, 'audio');
                            stream.getTracks().forEach(track => track.stop());
                        };
                        mediaRecorder.start();
                        isRecording = true;
                        recordBtn.style.backgroundColor = '#dc2626';
                    } catch (err) {
                        alert('Не удалось получить доступ к микрофону');
                    }
                } else {
                    mediaRecorder.stop();
                    isRecording = false;
                    recordBtn.style.backgroundColor = '#ef4444';
                }
            });

            // Эмодзи (исправленный импорт)
            emojiBtn.addEventListener('click', () => {
                emojiPicker.classList.toggle('show');
            });
            // Динамический импорт с правильным извлечением default
            import('https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.0/index.js')
                .then(module => {
                    const Picker = module.default; // важно
                    const picker = new Picker();
                    emojiPicker.appendChild(picker);
                    picker.addEventListener('emoji-click', event => {
                        messageInput.value += event.detail.unicode;
                        emojiPicker.classList.remove('show');
                    });
                })
                .catch(err => console.error('Ошибка загрузки EmojiPicker:', err));

            // Отправка сообщения
            sendMessageBtn.addEventListener('click', () => sendMessage());
            messageInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') sendMessage(); });

            // Обработка фокуса на поле ввода для мобильных
            messageInput.addEventListener('focus', () => {
                setTimeout(() => {
                    messageInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            });

            // -------------------------------------------------------------
            // 11. Аутентификация
            // -------------------------------------------------------------
            function handleLogin() {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                auth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message));
            }

            function handleRegister() {
                const email = document.getElementById('registerEmail').value;
                const password = document.getElementById('registerPassword').value;
                auth.createUserWithEmailAndPassword(email, password).catch(err => alert(err.message));
            }

            function handleLogout() {
                auth.signOut();
            }

            loginTab.addEventListener('click', () => {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            });
            registerTab.addEventListener('click', () => {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            });

            loginBtn.addEventListener('click', handleLogin);
            registerBtn.addEventListener('click', handleRegister);
            logoutBtn.addEventListener('click', handleLogout);

            // Навигация через бургер уже настроена

            searchBtn.addEventListener('click', () => searchUsers(searchInput.value));
            searchInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') searchUsers(searchInput.value); });

            createPostBtn.addEventListener('click', createPost);

            // Кнопка назад из чата на мобильных
            backFromChatBtn.addEventListener('click', () => {
                chatWindowContainer.classList.add('hidden');
                noChatSelected.classList.remove('hidden');
                if (unsubscribeMessages) unsubscribeMessages();
                currentChatId = null;
            });

            // Поиск в чатах
            chatSearchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                document.querySelectorAll('.chat-item').forEach(item => {
                    const name = item.querySelector('.chat-name')?.textContent.toLowerCase() || '';
                    if (name.includes(query)) {
                        item.style.display = 'flex';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });

            // -------------------------------------------------------------
            // 12. Слушатель состояния аутентификации
            // -------------------------------------------------------------
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    showApp();
                    await ensureUserProfile(user);
                    goToChats(); // по умолчанию открываем чаты
                } else {
                    currentUser = null;
                    currentUserProfile = null;
                    currentFollowees = [];
                    showAuth();
                    cleanupSubscriptions();
                    if (unsubscribeFollows) { unsubscribeFollows(); unsubscribeFollows = null; }
                }
            });

            // Обработка клавиатуры на мобильных
            window.addEventListener('resize', () => {
                document.body.style.height = window.innerHeight + 'px';
            });

            // Функции очистки
            function cleanupSubscriptions() {
                if (unsubscribeFeed) { unsubscribeFeed(); unsubscribeFeed = null; }
                if (unsubscribeProfilePosts) { unsubscribeProfilePosts(); unsubscribeProfilePosts = null; }
                if (unsubscribeChats) { unsubscribeChats(); unsubscribeChats = null; }
                if (unsubscribeMessages) { unsubscribeMessages(); unsubscribeMessages = null; }
            }

            function showAuth() {
                authContainer.classList.remove('hidden');
                appContainer.classList.add('hidden');
            }

            function showApp() {
                authContainer.classList.add('hidden');
                appContainer.classList.remove('hidden');
            }

            // Вспомогательная функция для перехода в профиль друга
            function goToUserProfile(uid) {
                showSectionOnly('profile');
                loadProfile(uid);
            }
        })();
    </script>
    <!-- Комментарии с правилами безопасности -->
    <!--
        Правила для Firebase Storage:
        service firebase.storage {
          match /b/{bucket}/o {
            match /avatars/{userId} {
              allow read: if request.auth != null;
              allow write: if request.auth != null && request.auth.uid == userId;
            }
            match /chats/{chatId}/{fileName} {
              allow read, write: if request.auth != null;
            }
          }
        }
    -->
</body>
</html>
