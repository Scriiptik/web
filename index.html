                if (freeCanvasCtx) {
                    freeCanvasCtx.fillStyle = '#ffffff';
                    freeCanvasCtx.fillRect(0, 0, 300, 300);
                }
                modePixel.classList.add('active');
                modeFree.classList.remove('active');
                pixelCanvasContainer.style.display = 'block';
                freeCanvasContainer.style.display = 'none';
                currentDrawingMode = 'pixel';
                drawingModal.classList.add('show');
            }

            saveDrawingBtn.addEventListener('click', () => {
                if (currentDrawingMode === 'pixel') {
                    const canvas = document.createElement('canvas');
                    canvas.width = 16;
                    canvas.height = 16;
                    const ctx = canvas.getContext('2d');
                    for (let i = 0; i < 16; i++) {
                        for (let j = 0; j < 16; j++) {
                            ctx.fillStyle = pixelGrid[i*16 + j];
                            ctx.fillRect(j, i, 1, 1);
                        }
                    }
                    const dataURL = canvas.toDataURL();
                    if (currentDrawingTarget === 'avatar') {
                        window.tempAvatar = dataURL;
                    } else {
                        postImage = dataURL;
                    }
                } else {
                    const dataURL = freeCanvas.toDataURL();
                    if (currentDrawingTarget === 'avatar') {
                        window.tempAvatar = dataURL;
                    } else {
                        postImage = dataURL;
                    }
                }
                drawingModal.classList.remove('show');
            });

            cancelDrawingBtn.addEventListener('click', () => drawingModal.classList.remove('show'));

            // Редактирование профиля
            function showEditForm() {
                editName.value = state.profile?.displayName || '';
                editBio.value = state.profile?.bio || '';
                editAvatar.value = '';
                editProfileModal.classList.add('show');
            }

            openPixelAvatarBtn.addEventListener('click', () => {
                editProfileModal.classList.remove('show');
                openDrawingModal('avatar');
            });
            openFreeAvatarBtn.addEventListener('click', () => {
                editProfileModal.classList.remove('show');
                openDrawingModal('avatar');
            });

            cancelEditBtn.addEventListener('click', () => {
                window.tempAvatar = null;
                editProfileModal.classList.remove('show');
            });

            saveProfileBtn.addEventListener('click', async () => {
                const newName = editName.value.trim();
                const newBio = editBio.value.trim();
                if (!newName) { alert('Имя не может быть пустым'); return; }
                const updates = { displayName: newName, bio: newBio };
                if (editAvatar.files.length > 0) {
                    const file = editAvatar.files[0];
                    const reader = new FileReader();
                    reader.onload = () => {
                        updates.avatar = reader.result;
                        db.collection('users').doc(state.currentUser.uid).update(updates);
                    };
                    reader.readAsDataURL(file);
                } else if (window.tempAvatar) {
                    updates.avatar = window.tempAvatar;
                    await db.collection('users').doc(state.currentUser.uid).update(updates);
                } else {
                    await db.collection('users').doc(state.currentUser.uid).update(updates);
                }
                window.tempAvatar = null;
                editProfileModal.classList.remove('show');
                loadProfile(state.currentUser.uid);
            });

            // Подписчики/подписки
            async function showUserList(type, uid) {
                const title = type === 'followers' ? 'Подписчики' : 'Подписки';
                userListTitle.textContent = title;
                let list;
                if (type === 'followers') {
                    const snap = await db.collection('follows').where('followeeId', '==', uid).get();
                    list = snap.docs.map(d => d.data().followerId);
                } else {
                    const snap = await db.collection('follows').where('followerId', '==', uid).get();
                    list = snap.docs.map(d => d.data().followeeId);
                }
                const users = await Promise.all(list.map(id => db.collection('users').doc(id).get()));
                userList.innerHTML = users.map(doc => {
                    const data = doc.data();
                    return `<div class="user-list-item" data-uid="${doc.id}">
                        <div style="width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:white;">${data.avatar ? `<img src="${data.avatar}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">` : (data.displayName?.[0] || '?')}</div>
                        <span>${data.displayName || data.email}</span>
                    </div>`;
                }).join('');
                userList.querySelectorAll('.user-list-item').forEach(item => {
                    item.addEventListener('click', () => {
                        userListModal.classList.remove('show');
                        showSection('profileSection');
                        loadProfile(item.dataset.uid);
                    });
                });
                userListModal.classList.add('show');
            }

            closeUserList.addEventListener('click', () => userListModal.classList.remove('show'));

            // Загрузка профиля
            async function loadProfile(uid) {
                const container = document.getElementById('profileContainer');
                container.innerHTML = '<div class="info-message">Загрузка...</div>';
                const userDoc = await db.collection('users').doc(uid).get();
                if (!userDoc.exists) return;
                const userData = userDoc.data();
                if (state.listeners.profilePosts) state.listeners.profilePosts();
                const postsQuery = db.collection('posts').where('userId', '==', uid).orderBy('timestamp', 'desc');
                state.listeners.profilePosts = postsQuery.onSnapshot(async (snap) => {
                    const followers = (await db.collection('follows').where('followeeId', '==', uid).get()).size;
                    const following = (await db.collection('follows').where('followerId', '==', uid).get()).size;
                    let isFollowing = false;
                    if (state.currentUser && uid !== state.currentUser.uid) {
                        const followDoc = await db.collection('follows').doc(`${state.currentUser.uid}_${uid}`).get();
                        isFollowing = followDoc.exists;
                    }
                    renderProfile(uid, userData, snap.docs, followers, following, isFollowing);
                });
            }

            function renderProfile(uid, userData, postsDocs, followers, following, isFollowing) {
                const container = document.getElementById('profileContainer');
                const isOwn = uid === state.currentUser.uid;
                const avatarHtml = userData.avatar ? `<img src="${userData.avatar}" class="avatar-img">` : (userData.displayName?.[0] || '?');
                const followBtn = !isOwn ? `<button class="follow-btn ${isFollowing ? 'btn-secondary' : 'btn-primary'}" data-uid="${uid}">${isFollowing ? 'Отписаться' : 'Подписаться'}</button>` : '';
                const messageBtn = !isOwn ? `<button class="btn-secondary" data-message-uid="${uid}">✉ Написать</button>` : '';
                const editBtn = isOwn ? '<button id="editProfileBtn" class="btn-secondary">✎ Редактировать</button>' : '';
                let postsHtml = postsDocs.map(doc => {
                    const p = doc.data();
                    const time = p.timestamp ? new Date(p.timestamp.toDate()).toLocaleString() : '';
                    return `<div class="post"><div class="post-text">${p.text}</div>${p.image ? `<img src="${p.image}" style="max-width:100%;">` : ''}<div class="post-time">${time}</div></div>`;
                }).join('') || '<p>Нет постов</p>';
                container.innerHTML = `
                    <div class="card">
                        <div class="profile-header">
                            <div class="avatar">${avatarHtml}</div>
                            <div class="profile-info">
                                <h2>${userData.displayName || 'Без имени'}</h2>
                                <p>${userData.bio || ''}</p>
                                <div class="stats">
                                    <span class="followers-stats" data-uid="${uid}">${followers} подписчиков</span>
                                    <span class="following-stats" data-uid="${uid}">${following} подписок</span>
                                </div>
                                <div class="flex-row" style="margin-top:1rem;">${followBtn} ${messageBtn} ${editBtn}</div>
                            </div>
                        </div>
                    </div>
                    <div class="card"><h3>Посты</h3>${postsHtml}</div>
                `;
                document.querySelector('.followers-stats')?.addEventListener('click', () => showUserList('followers', uid));
                document.querySelector('.following-stats')?.addEventListener('click', () => showUserList('following', uid));
                if (!isOwn) {
                    document.querySelector('[data-message-uid]')?.addEventListener('click', () => openChatWithUser(uid));
                    document.querySelector('.follow-btn')?.addEventListener('click', e => toggleFollow(uid, isFollowing));
                } else {
                    document.getElementById('editProfileBtn')?.addEventListener('click', showEditForm);
                }
            }

            async function toggleFollow(targetUid, currently) {
                const id = `${state.currentUser.uid}_${targetUid}`;
                if (currently) await db.collection('follows').doc(id).delete();
                else await db.collection('follows').doc(id).set({ followerId: state.currentUser.uid, followeeId: targetUid, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            }

            // Поиск
            searchBtn.addEventListener('click', () => searchUsers(searchInput.value));
            searchInput.addEventListener('keyup', e => e.key === 'Enter' && searchUsers(searchInput.value));

            async function searchUsers(query) {
                if (!query.trim()) return;
                searchResults.innerHTML = '<div class="info-message">Поиск...</div>';
                const nameQuery = db.collection('users').orderBy('displayName').startAt(query).endAt(query + '\uf8ff').get();
                const emailQuery = db.collection('users').orderBy('email').startAt(query).endAt(query + '\uf8ff').get();
                const [nameSnap, emailSnap] = await Promise.all([nameQuery, emailQuery]);
                const users = new Map();
                nameSnap.docs.forEach(d => users.set(d.id, d.data()));
                emailSnap.docs.forEach(d => users.set(d.id, d.data()));
                if (!users.size) { searchResults.innerHTML = '<div class="info-message">Ничего не найдено</div>'; return; }
                let html = '';
                for (let [uid, data] of users.entries()) {
                    if (uid === state.currentUser.uid) continue;
                    const isFollowing = state.followees.includes(uid);
                    html += `<div class="user-card" style="display:flex; align-items:center; justify-content:space-between; padding:0.5rem 0; border-bottom:1px solid var(--border-light);">
                        <div class="info" style="display:flex; align-items:center; gap:1rem;">
                            <div style="width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:white;">${data.avatar ? `<img src="${data.avatar}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">` : (data.displayName?.[0] || '?')}</div>
                            <div><h4 class="user-name-link" data-uid="${uid}" style="cursor:pointer;color:var(--accent);">${data.displayName || data.email}</h4><small>${data.email}</small></div>
                        </div>
                        <div>
                            <button class="follow-btn ${isFollowing ? 'btn-secondary' : 'btn-primary'}" data-follow-uid="${uid}">${isFollowing ? 'Отписаться' : 'Подписаться'}</button>
                            <button class="btn-secondary" data-message-uid="${uid}">✉</button>
                        </div>
                    </div>`;
                }
                searchResults.innerHTML = html;
                document.querySelectorAll('.follow-btn').forEach(b => b.addEventListener('click', async e => {
                    const uid = b.dataset.followUid;
                    await toggleFollow(uid, b.classList.contains('btn-secondary'));
                    searchUsers(searchInput.value);
                }));
                document.querySelectorAll('[data-message-uid]').forEach(b => b.addEventListener('click', e => openChatWithUser(b.dataset.messageUid)));
                document.querySelectorAll('.user-name-link').forEach(span => span.addEventListener('click', e => {
                    showSection('profileSection');
                    loadProfile(span.dataset.uid);
                }));
            }

            // Чаты
            async function getOrCreateChat(otherUid) {
                const currentUid = state.currentUser.uid;
                const chatsRef = db.collection('chats');
                const snapshot = await chatsRef.where('participants', 'array-contains', currentUid).get();
                let chat = null;
                snapshot.forEach(doc => {
                    if (doc.data().participants.includes(otherUid)) chat = { id: doc.id, ...doc.data() };
                });
                if (!chat) {
                    const newChat = await chatsRef.add({
                        participants: [currentUid, otherUid],
                        lastMessage: '',
                        lastMessageTimestamp: null,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    chat = { id: newChat.id, participants: [currentUid, otherUid] };
                }
                return chat;
            }

            function updateChatHeader() {
                if (!state.currentChatParticipant) return;
                const name = state.currentChatParticipant.displayName || state.currentChatParticipant.email;
                // Убран индикатор онлайн
                chatHeader.textContent = name;
            }

            async function openChatWithUser(otherUid) {
                const chat = await getOrCreateChat(otherUid);
                state.currentChatId = chat.id;
                const userDoc = await db.collection('users').doc(otherUid).get();
                state.currentChatParticipant = { uid: otherUid, ...userDoc.data() };

                // Подписка на изменения статуса онлайн
                if (state.listeners.presence) state.listeners.presence();
                state.listeners.presence = db.collection('users').doc(otherUid).onSnapshot(doc => {
                    console.log('Presence snapshot received', doc.data());
                    if (doc.exists) {
                        state.currentChatParticipant = { uid: otherUid, ...doc.data() };
                        updateChatHeader(); // обновляем заголовок (без онлайн)
                    }
                });

                // Подписка на статус печатания собеседника полностью удалена (индикатор не нужен)

                showSection('chatsSection');
                if (window.innerWidth <= 768) chatsSidebar.classList.add('hide-mobile');
                chatWindowContainer.classList.remove('hidden');
                noChatSelected.classList.add('hidden');
                updateChatHeader();
                chatHeader.onclick = () => {
                    showSection('profileSection');
                    loadProfile(otherUid);
                };
                loadMessages(chat.id);
                loadChats();
            }

            function loadChats() {
                if (!state.currentUser) return;
                if (state.listeners.chats) state.listeners.chats();
                const q = db.collection('chats').where('participants', 'array-contains', state.currentUser.uid).orderBy('updatedAt', 'desc');
                state.listeners.chats = q.onSnapshot(async snap => {
                    const chats = await Promise.all(snap.docs.map(async doc => {
                        const chat = { id: doc.id, ...doc.data() };
                        const otherUid = chat.participants.find(uid => uid !== state.currentUser.uid);
                        const user = await db.collection('users').doc(otherUid).get();
                        return { ...chat, otherUser: { uid: otherUid, ...user.data() } };
                    }));
                    renderChatsList(chats);
                });
            }

            function renderChatsList(chats) {
                if (!chats.length) { chatsList.innerHTML = '<div class="info-message">Нет чатов</div>'; return; }
                let html = '';
                chats.forEach(chat => {
                    const lastMsg = chat.lastMessage || 'Нет сообщений';
                    const time = chat.lastMessageTimestamp ? new Date(chat.lastMessageTimestamp.toDate()).toLocaleTimeString() : '';
                    const activeClass = chat.id === state.currentChatId ? 'active' : '';
                    html += `<div class="chat-item ${activeClass}" data-chat-id="${chat.id}" data-other-uid="${chat.otherUser.uid}">
                        <div class="chat-avatar">${chat.otherUser.avatar ? `<img src="${chat.otherUser.avatar}" style="width:54px;height:54px;border-radius:50%;object-fit:cover;">` : (chat.otherUser.displayName?.[0] || '?')}</div>
                        <div class="chat-info"><div class="chat-name">${chat.otherUser.displayName || chat.otherUser.email}</div><div class="chat-last-message">${lastMsg}</div></div>
                        <div class="chat-time">${time}</div>
                    </div>`;
                });
                chatsList.innerHTML = html;
                document.querySelectorAll('.chat-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const chatId = item.dataset.chatId;
                        const otherUid = item.dataset.otherUid;
                        state.currentChatId = chatId;
                        db.collection('users').doc(otherUid).get().then(doc => {
                            state.currentChatParticipant = { uid: otherUid, ...doc.data() };
                            updateChatHeader(); // обновляем заголовок после загрузки данных
                        });
                        if (window.innerWidth <= 768) chatsSidebar.classList.add('hide-mobile');
                        chatWindowContainer.classList.remove('hidden');
                        noChatSelected.classList.add('hidden');
                        chatHeader.onclick = () => {
                            showSection('profileSection');
                            loadProfile(otherUid);
                        };
                        loadMessages(chatId);
                        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                    });
                });
            }

            function loadMessages(chatId) {
                if (state.listeners.messages) state.listeners.messages();
                const q = db.collection('messages').where('chatId', '==', chatId).orderBy('timestamp', 'asc');
                state.listeners.messages = q.onSnapshot(snap => {
                    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderMessages(msgs);
                });
            }

            // Функция для установки статуса печатает (оставлена, но не используется для отображения)
            function setTypingStatus(chatId, userId, isTyping) {
                console.log('setTypingStatus', {chatId, userId, isTyping});
                const typingRef = db.collection('chats').doc(chatId).collection('typing').doc(userId);
                if (isTyping) {
                    typingRef.set({ timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                } else {
                    typingRef.delete();
                }
            }

            function handleTyping() {
                console.log('handleTyping called, currentChatId =', state.currentChatId);
                if (!state.currentChatId) return;
                setTypingStatus(state.currentChatId, state.currentUser.uid, true);
                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    console.log('typing timeout, setting false');
                    setTypingStatus(state.currentChatId, state.currentUser.uid, false);
                }, TYPING_TIMEOUT);
            }

            // Функция renderMessages с улучшенным свайпом
            function renderMessages(msgs) {
                if (!msgs.length) { messagesContainer.innerHTML = '<div class="info-message">Нет сообщений</div>'; return; }
                let html = '';
                msgs.forEach(m => {
                    const isOwn = m.senderId === state.currentUser.uid;
                    const sender = isOwn ? 'Вы' : (state.currentChatParticipant?.displayName || '');
                    const time = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString() : '';

                    let replyHtml = '';
                    if (m.replyTo) {
                        replyHtml = `<div class="message-reply" data-reply-to="${m.replyTo.messageId}">
                            <span class="reply-sender">${m.replyTo.sender}</span>
                            <span class="reply-text">${m.replyTo.text}</span>
                        </div>`;
                    }

                    let media = '';
                    if (m.media) {
                        if (m.mediaType === 'image') media = `<img src="${m.media}" class="message-media" style="max-width:200px; border-radius:0.5rem;">`;
                        else if (m.mediaType === 'audio') media = `<audio controls src="${m.media}" class="message-audio"></audio>`;
                    }
                    const isSingleEmoji = m.text && /^[\p{Emoji}]+$/u.test(m.text) && m.text.length <= 2;
                    const msgClass = `message ${isOwn ? 'own' : ''} ${isSingleEmoji ? 'single-emoji' : ''}`;
                    const deleteBtn = `<button class="delete-msg" data-msg-id="${m.id}">🗑️</button>`;

                    html += `<div class="${msgClass}" data-msg-id="${m.id}">
                        <div class="message-sender">${sender}</div>
                        ${replyHtml}
                        <div>${m.text || ''}</div>
                        ${media}
                        <div class="message-time">${time}</div>
                        ${deleteBtn}
                    </div>`;
                });
                messagesContainer.innerHTML = html;

                document.querySelectorAll('.delete-msg').forEach(btn => {
                    btn.addEventListener('click', async e => {
                        e.stopPropagation();
                        const msgId = btn.dataset.msgId;
                        if (confirm('Удалить сообщение?')) {
                            await deleteMessage(msgId);
                        }
                    });
                });

                // Обработчики для ответа: свайп влево (с визуальным сдвигом) и двойной клик
                document.querySelectorAll('.message').forEach(msgEl => {
                    const msgId = msgEl.dataset.msgId;
                    const senderEl = msgEl.querySelector('.message-sender');
                    const sender = senderEl ? senderEl.textContent : '';
                    const textEl = msgEl.querySelector('div:not(.message-sender):not(.message-reply):not(.message-time)');
                    const text = textEl ? textEl.textContent : '';

                    // Двойной клик (ПК)
                    msgEl.addEventListener('dblclick', (e) => {
                        e.preventDefault();
                        setReply(msgId, sender, text);
                    });

                    // Переменные для свайпа
                    let touchStartX = 0;
                    let touchCurrentX = 0;
                    let isSwiping = false;
                    const SWIPE_THRESHOLD = 80;

                    const onTouchStart = (e) => {
                        touchStartX = e.touches[0].clientX;
                        isSwiping = false;
                        msgEl.classList.remove('swiping');
                    };

                    const onTouchMove = (e) => {
                        if (!touchStartX) return;
                        const currentX = e.touches[0].clientX;
                        const deltaX = currentX - touchStartX;
                        if (deltaX < 0) {
                            e.preventDefault();
                            isSwiping = true;
                            msgEl.classList.add('swiping');
                            const translateX = Math.max(deltaX, -100);
                            msgEl.style.transform = `translateX(${translateX}px)`;
                            touchCurrentX = currentX;
                        }
                    };

                    const onTouchEnd = (e) => {
                        if (!isSwiping) {
                            msgEl.style.transform = '';
                            msgEl.classList.remove('swiping');
                            return;
                        }
                        const deltaX = touchCurrentX - touchStartX;
                        if (deltaX < -SWIPE_THRESHOLD) {
                            setReply(msgId, sender, text);
                        }
                        msgEl.style.transform = '';
                        msgEl.classList.remove('swiping');
                        touchStartX = 0;
                        isSwiping = false;
                    };

                    msgEl.addEventListener('touchstart', onTouchStart, { passive: true });
                    msgEl.addEventListener('touchmove', onTouchMove, { passive: false });
                    msgEl.addEventListener('touchend', onTouchEnd);
                    msgEl.addEventListener('touchcancel', () => {
                        msgEl.style.transform = '';
                        msgEl.classList.remove('swiping');
                    });
                });

                document.querySelectorAll('.message-reply').forEach(replyEl => {
                    replyEl.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const targetMsgId = replyEl.dataset.replyTo;
                        const targetMsgEl = document.querySelector(`.message[data-msg-id="${targetMsgId}"]`);
                        if (targetMsgEl) {
                            targetMsgEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            targetMsgEl.style.transition = 'background 0.3s';
                            targetMsgEl.style.background = 'var(--accent)';
                            setTimeout(() => targetMsgEl.style.background = '', 1000);
                        }
                    });
                });

                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            // Функции для управления ответом
            function setReply(messageId, sender, text) {
                replyToMessageId = messageId;
                replyToSender = sender;
                replyToText = text;

                const panel = document.getElementById('replyPanel');
                panel.querySelector('.reply-sender').textContent = sender;
                panel.querySelector('.reply-text').textContent = text.length > 30 ? text.slice(0,30)+'…' : text;
                panel.classList.remove('hidden');
            }

            function clearReply() {
                replyToMessageId = null;
                replyToSender = '';
                replyToText = '';
                document.getElementById('replyPanel').classList.add('hidden');
            }

            document.getElementById('cancelReplyBtn').addEventListener('click', clearReply);

            async function deleteMessage(msgId) {
                if (!state.currentChatId) return;
                try {
                    const msgRef = db.collection('messages').doc(msgId);
                    await msgRef.delete();
                    const chatRef = db.collection('chats').doc(state.currentChatId);
                    const messagesQuery = await db.collection('messages')
                        .where('chatId', '==', state.currentChatId)
                        .orderBy('timestamp', 'desc')
                        .limit(1)
                        .get();
                    if (!messagesQuery.empty) {
                        const last = messagesQuery.docs[0].data();
                        await chatRef.update({
                            lastMessage: last.text || (last.mediaType === 'image' ? '📷' : '🎤'),
                            lastMessageTimestamp: last.timestamp,
                            lastMessageSender: last.senderId,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } else {
                        await chatRef.update({
                            lastMessage: '',
                            lastMessageTimestamp: null,
                            lastMessageSender: null,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                } catch (error) {
                    console.error('Ошибка удаления:', error);
                    alert('Не удалось удалить сообщение. Попробуйте снова.');
                }
            }

            // Изменённая функция sendMessage с поддержкой replyTo
            async function sendMessage(text, media, mediaType) {
                const msgText = text !== undefined ? text : messageInput.value.trim();
                if (!msgText && !media) return;
                const msg = {
                    chatId: state.currentChatId,
                    senderId: state.currentUser.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    read: false
                };
                if (msgText) msg.text = msgText;
                if (media) { msg.media = media; msg.mediaType = mediaType; }
                if (replyToMessageId) {
                    msg.replyTo = {
                        messageId: replyToMessageId,
                        sender: replyToSender,
                        text: replyToText
                    };
                }
                await db.collection('messages').add(msg);
                await db.collection('chats').doc(state.currentChatId).update({
                    lastMessage: msgText || (mediaType === 'image' ? '📷' : '🎤'),
                    lastMessageTimestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    lastMessageSender: state.currentUser.uid,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                if (!media) messageInput.value = '';
                clearReply();
                // Сбрасываем статус печатает после отправки
                if (typingTimeout) clearTimeout(typingTimeout);
                setTypingStatus(state.currentChatId, state.currentUser.uid, false);
            }

            sendMessageBtn.addEventListener('click', () => sendMessage());
            messageInput.addEventListener('keyup', e => e.key === 'Enter' && sendMessage());
            messageInput.addEventListener('input', handleTyping);

            // Медиа
            attachBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', e => {
                const file = e.target.files[0];
                if (!file || !state.currentChatId) return;
                const reader = new FileReader();
                reader.onload = () => {
                    sendMessage(null, reader.result, file.type.startsWith('image/') ? 'image' : 'video');
                };
                reader.readAsDataURL(file);
                fileInput.value = '';
            });

            // Голос
            let mediaRecorder, audioChunks, isRecording = false;
            let recordingStartTime, timerInterval, analyser, dataArray, audioContext, source, stream;

            recordBtn.addEventListener('mousedown', startRecording);
            recordBtn.addEventListener('mouseup', stopRecording);
            recordBtn.addEventListener('mouseleave', stopRecording);
            recordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
            recordBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });
            recordBtn.addEventListener('touchcancel', stopRecording);

            async function startRecording() {
                if (!state.currentChatId || isRecording) return;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                    const mimeTypes = [
                        'audio/mp4',
                        'audio/aac',
                        'audio/webm; codecs=opus',
                        'audio/webm'
                    ];
                    let options = {};
                    for (let mt of mimeTypes) {
                        if (MediaRecorder.isTypeSupported(mt)) {
                            options = { mimeType: mt };
                            break;
                        }
                    }

                    mediaRecorder = new MediaRecorder(stream, options);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = async () => {
                        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = () => {
                            sendMessage(null, reader.result, 'audio');
                        };
                        reader.readAsDataURL(blob);
                        stream.getTracks().forEach(t => t.stop());
                        if (audioContext) await audioContext.close();
                    };

                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    source = audioContext.createMediaStreamSource(stream);
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.style.color = '#ff0000';
                    voicePanel.classList.add('active');
                    recordingStartTime = Date.now();
                    updateTimer();
                } catch (err) {
                    alert('Нет доступа к микрофону');
                }
            }

            function stopRecording() {
                if (!isRecording) return;
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.style.color = '';
                voicePanel.classList.remove('active');
                if (timerInterval) clearInterval(timerInterval);
                if (source) source.disconnect();
                if (audioContext) audioContext.close();
            }

            function updateTimer() {
                timerInterval = setInterval(() => {
                    if (!isRecording) return;
                    const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                    const mins = Math.floor(elapsed / 60);
                    const secs = elapsed % 60;
                    voiceTimer.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                    if (analyser && dataArray) {
                        analyser.getByteFrequencyData(dataArray);
                        const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
                        const level = Math.min(100, (avg / 128) * 100);
                        voiceLevel.style.width = level + '%';
                    }
                }, 100);
            }

            // Эмодзи-пикер
            const emojiList = ['😀', '😃', '😄', '😁', '😆', '😅', '😂', '🤣', '😊', '😇', '🙂', '🙃', '😉', '😌', '😍', '🥰', '😘', '😗', '😙', '😚', '😋', '😛', '😝', '😜', '🤪', '🤨', '🧐', '🤓', '😎', '🥸', '🤩', '🥳', '😏', '😒', '😞', '😔', '😟', '😕', '🙁', '☹️', '😣', '😖', '😫', '😩', '🥺', '😢', '😭', '😤', '😠', '😡', '🤬', '🤯', '😳', '🥵', '🥶', '😱', '😨', '😰', '😥', '😓', '🤗', '🤔', '🤭', '🤫', '🤥', '😶', '😐', '😑', '😬', '🙄', '😯', '😦', '😧', '😮', '😲', '🥱', '😴', '🤤', '😪', '😵', '🤐', '🥴', '🤢', '🤮', '🤧', '😷', '🤒', '🤕', '🤑', '🤠', '😈', '👿', '👹', '👺', '🤡', '💩', '👻', '💀', '☠️', '👽', '👾', '🤖', '🎃', '😺', '😸', '😹', '😻', '😼', '😽', '🙀', '😿', '😾'];
            emojiBtn.addEventListener('click', () => {
                if (emojiPicker.classList.contains('hidden')) {
                    emojiPicker.innerHTML = '';
                    emojiList.forEach(e => {
                        const span = document.createElement('span');
                        span.className = 'emoji-item';
                        span.textContent = e;
                        span.onclick = () => {
                            messageInput.value += e;
                            emojiPicker.classList.add('hidden');
                        };
                        emojiPicker.appendChild(span);
                    });
                    emojiPicker.classList.remove('hidden');
                } else {
                    emojiPicker.classList.add('hidden');
                }
            });

            // Посты с рисованием
            openPixelPostBtn.addEventListener('click', () => {
                currentDrawingTarget = 'post';
                openDrawingModal('post');
            });
            openFreePostBtn.addEventListener('click', () => {
                currentDrawingTarget = 'post';
                openDrawingModal('post');
            });

            uploadPostImageBtn.addEventListener('click', () => postImageInput.click());
            postImageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        postImage = reader.result;
                        alert('Изображение загружено, теперь опубликуйте пост');
                    };
                    reader.readAsDataURL(file);
                }
            });

            createPostBtn.addEventListener('click', async () => {
                const text = postText.value.trim();
                if (!text && !postImage) return;
                await db.collection('posts').add({
                    userId: state.currentUser.uid,
                    text: text || '',
                    image: postImage || null,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: []
                });
                postText.value = '';
                postImage = null;
            });

            // Назад из чата
            backFromChatBtn.addEventListener('click', () => {
                chatsSidebar.classList.remove('hide-mobile');
                chatWindowContainer.classList.add('hidden');
                noChatSelected.classList.remove('hidden');
                if (state.listeners.messages) state.listeners.messages();
                if (state.listeners.presence) state.listeners.presence();
                // подписка на typing не нужна
                state.currentChatId = null;
            });

            chatSearchInput.addEventListener('input', e => {
                const q = e.target.value.toLowerCase();
                document.querySelectorAll('.chat-item').forEach(item => {
                    const name = item.querySelector('.chat-name')?.textContent.toLowerCase() || '';
                    item.style.display = name.includes(q) ? 'flex' : 'none';
                });
            });

            // Аутентификация
            function handleLogin() {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                auth.signInWithEmailAndPassword(email, pass).catch(e => alert('Ошибка входа: ' + e.message));
            }
            function handleRegister() {
                const email = document.getElementById('registerEmail').value;
                const pass = document.getElementById('registerPassword').value;
                auth.createUserWithEmailAndPassword(email, pass).catch(e => alert('Ошибка регистрации: ' + e.message));
            }
            loginBtn.addEventListener('click', handleLogin);
            registerBtn.addEventListener('click', handleRegister);
            logoutBtn.addEventListener('click', async () => {
                await setUserOffline();
                auth.signOut();
            });

            loginTab.addEventListener('click', () => {
                loginTab.classList.add('active'); registerTab.classList.remove('active');
                loginForm.classList.remove('hidden'); registerForm.classList.add('hidden');
            });
            registerTab.addEventListener('click', () => {
                registerTab.classList.add('active'); loginTab.classList.remove('active');
                registerForm.classList.remove('hidden'); loginForm.classList.add('hidden');
            });

            auth.onAuthStateChanged(async user => {
                if (user) {
                    state.currentUser = user;
                    authContainer.classList.add('hidden');
                    appContainer.classList.remove('hidden');
                    await ensureUserProfile(user);
                    // Устанавливаем онлайн
                    await db.collection('users').doc(user.uid).update({
                        online: true,
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    Object.values(state.listeners).forEach(fn => fn && fn());
                    showSection('chatsSection');
                } else {
                    state.currentUser = null;
                    authContainer.classList.remove('hidden');
                    appContainer.classList.add('hidden');
                }
            });

            window.addEventListener('resize', () => {
                document.body.style.height = window.innerHeight + 'px';
                document.getElementById('app').style.height = window.innerHeight + 'px';
            });

            // Обработчик beforeunload для отправки offline статуса при закрытии вкладки
            window.addEventListener('beforeunload', function() {
                if (state.currentUser) {
                    // Используем sendBeacon для гарантированной отправки
                    const url = `https://firestore.googleapis.com/v1/projects/${firebase.app().options.projectId}/databases/(default)/documents/users/${state.currentUser.uid}?updateMask.fieldPaths=online&updateMask.fieldPaths=lastSeen`;
                    const payload = {
                        fields: {
                            online: { booleanValue: false },
                            lastSeen: { timestampValue: new Date().toISOString() }
                        }
                    };
                    navigator.sendBeacon(url, JSON.stringify(payload));
                }
            });

            // Инициализация
            initPalette();
        })();
    </script>
</body>
</html>
