            // AR Module
            function initARModule() {
                const arVideo = document.getElementById('arVideo');
                const arDrawCanvas = document.getElementById('arDrawCanvas');
                const arUiCanvas = document.getElementById('arUiCanvas');
                const arDrawCtx = arDrawCanvas.getContext('2d');
                const arUiCtx = arUiCanvas.getContext('2d');
                const arClearBtn = document.getElementById('arClearBtn');
                const arColorEls = document.querySelectorAll('.ar-color');

                let arCurrentColor = 'red';
                let arDrawing = false;
                let arLastX = null, arLastY = null;
                let arWasPinch = false;
                let arSmooth = null;
                const SMOOTH = 0.6;

                function resize() {
                    arDrawCanvas.width = arUiCanvas.width = window.innerWidth;
                    arDrawCanvas.height = arUiCanvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resize);
                resize();

                function lerp(a, b, t) { return a + (b - a) * t; }
                function smoothPoints(src) {
                    if (!arSmooth) { arSmooth = src.map(p => ({ ...p })); return arSmooth; }
                    src.forEach((p, i) => {
                        arSmooth[i].x = lerp(arSmooth[i].x, p.x, SMOOTH);
                        arSmooth[i].y = lerp(arSmooth[i].y, p.y, SMOOTH);
                    });
                    return arSmooth;
                }

                const arHands = new Hands({
                    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
                });
                arHands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.7
                });

                arHands.onResults(results => {
                    arUiCtx.clearRect(0, 0, arUiCanvas.width, arUiCanvas.height);

                    if (!results.multiHandLandmarks?.length) {
                        arDrawing = false; arSmooth = null; arWasPinch = false;
                        return;
                    }

                    const lm = smoothPoints(results.multiHandLandmarks[0]);
                    const i = lm[8], t = lm[4];
                    const dist = Math.hypot(i.x - t.x, i.y - t.y);
                    const pinch = dist < 0.045;

                    const cx = (i.x + t.x) / 2;
                    const cy = (i.y + t.y) / 2;
                    const px = (1 - cx) * arDrawCanvas.width;
                    const py = cy * arDrawCanvas.height;

                    let hoverColor = null;
                    arColorEls.forEach(el => {
                        el.classList.remove('hover');
                        const r = el.getBoundingClientRect();
                        if (px > r.left && px < r.right && py > r.top && py < r.bottom) {
                            el.classList.add('hover');
                            hoverColor = el;
                        }
                    });

                    arClearBtn.classList.remove('hover');
                    const cr = arClearBtn.getBoundingClientRect();
                    const hoverClear = px > cr.left && px < cr.right && py > cr.top && py < cr.bottom;
                    if (hoverClear) arClearBtn.classList.add('hover');

                    if (arWasPinch && !pinch) {
                        if (hoverColor) {
                            arCurrentColor = hoverColor.dataset.color;
                            arColorEls.forEach(c => c.classList.remove('active'));
                            hoverColor.classList.add('active');
                        }
                        if (hoverClear) {
                            arDrawCtx.clearRect(0, 0, arDrawCanvas.width, arDrawCanvas.height);
                        }
                    }

                    if (pinch && !hoverColor && !hoverClear) {
                        if (!arDrawing) {
                            arDrawing = true;
                            arLastX = px; arLastY = py;
                        } else {
                            arDrawCtx.strokeStyle = arCurrentColor;
                            arDrawCtx.lineWidth = 5;
                            arDrawCtx.lineCap = 'round';
                            arDrawCtx.beginPath();
                            arDrawCtx.moveTo(arLastX, arLastY);
                            arDrawCtx.lineTo(px, py);
                            arDrawCtx.stroke();
                            arLastX = px; arLastY = py;
                        }
                    } else {
                        arDrawing = false;
                    }

                    arUiCtx.fillStyle = pinch ? 'lime' : 'white';
                    arUiCtx.beginPath();
                    arUiCtx.arc(px, py, pinch ? 10 : 6, 0, Math.PI * 2);
                    arUiCtx.fill();

                    arWasPinch = pinch;
                });

                let arStream = null;
                let arAnimationFrame = null;

                async function startAR() {
                    if (!arStream) {
                        try {
                            arStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                            arVideo.srcObject = arStream;
                            await arVideo.play();
                        } catch (err) {
                            console.error('AR camera error:', err);
                            return;
                        }
                    }

                    async function processFrame() {
                        if (!arVideo.videoWidth) {
                            arAnimationFrame = requestAnimationFrame(processFrame);
                            return;
                        }
                        await arHands.send({ image: arVideo });
                        arAnimationFrame = requestAnimationFrame(processFrame);
                    }
                    processFrame();
                }

                function stopAR() {
                    if (arAnimationFrame) {
                        cancelAnimationFrame(arAnimationFrame);
                        arAnimationFrame = null;
                    }
                    if (arStream) {
                        arStream.getTracks().forEach(t => t.stop());
                        arStream = null;
                    }
                    if (arVideo) arVideo.srcObject = null;
                    arDrawCtx.clearRect(0, 0, arDrawCanvas.width, arDrawCanvas.height);
                    arUiCtx.clearRect(0, 0, arUiCanvas.width, arUiCanvas.height);
                }

                return { startAR, stopAR };
            }

            arModule = initARModule();

            // Аутентификация
            function handleLogin() {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                auth.signInWithEmailAndPassword(email, pass).catch(e => alert('Ошибка входа: ' + e.message));
            }
            function handleRegister() {
                const email = document.getElementById('registerEmail').value;
                const pass = document.getElementById('registerPassword').value;
                auth.createUserWithEmailAndPassword(email, pass).catch(e => alert('Ошибка регистрации: ' + e.message));
            }

            loginBtn.addEventListener('click', handleLogin);
            registerBtn.addEventListener('click', handleRegister);

            loginTab.addEventListener('click', () => {
                loginTab.classList.add('active'); registerTab.classList.remove('active');
                loginForm.classList.remove('hidden'); registerForm.classList.add('hidden');
            });
            registerTab.addEventListener('click', () => {
                registerTab.classList.add('active'); loginTab.classList.remove('active');
                registerForm.classList.remove('hidden'); loginForm.classList.add('hidden');
            });

            logoutBtn.addEventListener('click', () => auth.signOut());
            if (logoutBtnMobile) {
                logoutBtnMobile.addEventListener('click', () => auth.signOut());
            }

            auth.onAuthStateChanged(async user => {
                if (user) {
                    state.currentUser = user;
                    const splash = document.getElementById('splash-screen');
                    splash.classList.remove('hidden');
                    setTimeout(async () => {
                        authContainer.classList.add('hidden');
                        appContainer.classList.remove('hidden');
                        await ensureUserProfile(user);
                        Object.values(state.listeners).forEach(fn => fn && fn());
                        showSection('chatsSection');
                        splash.classList.add('hidden');
                    }, 2000);
                } else {
                    state.currentUser = null;
                    authContainer.classList.remove('hidden');
                    appContainer.classList.add('hidden');
                }
            });

            window.addEventListener('resize', () => {
                document.body.style.height = window.innerHeight + 'px';
                document.getElementById('app').style.height = window.innerHeight + 'px';
            });

            initPalette();

            // ---------- Кнопка установки приложения (PWA) ----------
            const installAppBtn = document.getElementById('installAppBtn');
            if (installAppBtn) {
                installAppBtn.addEventListener('click', showInstallInstructions);
            }

            function showInstallInstructions() {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                const isAndroid = /Android/.test(navigator.userAgent);
                let message = '';

                if (isIOS) {
                    message = 'Нажмите "Поделиться" <span style="font-size:1.5rem;">⬆️</span> в Safari, затем выберите "На экран «Домой»".';
                } else if (isAndroid && window.matchMedia('(display-mode: standalone)').matches) {
                    message = 'Приложение уже установлено.';
                } else if (isAndroid) {
                    message = 'В меню браузера выберите "Добавить на главный экран".';
                } else {
                    message = 'Для установки нажмите соответствующую иконку в адресной строке.';
                }
                alert(message); // В продакшене заменить на красивое модальное окно
            }
