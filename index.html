<!DOCTYPE html>
<html>
<head>
    <title>Совместное рисование</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f0f0; }
        canvas { display: block; background: white; touch-action: none; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 100;
        }
        input, button {
            margin: 2px;
            padding: 5px;
            font-size: 14px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="controls">
        <div>
            <button id="createBtn">Создать соединение</button>
            <span id="peerIdDisplay"></span>
        </div>
        <div>
            <input id="peerIdInput" placeholder="ID друга" />
            <button id="connectBtn">Подключиться</button>
        </div>
        <div><button id="clearBtn">Очистить</button></div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            let drawing = false;
            let peer = null;
            let conn = null;  // активное соединение
            let peerId = null;

            // Настройка размеров canvas на весь экран
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                // Можно перерисовать сохранённое изображение, если хотите сохранять рисунок
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Рисование
            function startDrawing(e) {
                e.preventDefault();
                drawing = true;
                ctx.beginPath();
                const pos = getCoordinates(e);
                ctx.moveTo(pos.x, pos.y);
                // Отправляем событие начала рисования другу
                if (conn && conn.open) {
                    conn.send({ type: 'start', x: pos.x, y: pos.y });
                }
            }

            function draw(e) {
                e.preventDefault();
                if (!drawing) return;
                const pos = getCoordinates(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                // Отправляем событие движения
                if (conn && conn.open) {
                    conn.send({ type: 'draw', x: pos.x, y: pos.y });
                }
            }

            function stopDrawing() {
                drawing = false;
                ctx.beginPath(); // подготовка к новому штриху
                if (conn && conn.open) {
                    conn.send({ type: 'stop' });
                }
            }

            // Получение координат мыши/пальца
            function getCoordinates(e) {
                let x, y;
                if (e.touches) {
                    // сенсорное событие
                    x = e.touches[0].clientX;
                    y = e.touches[0].clientY;
                } else {
                    x = e.clientX;
                    y = e.clientY;
                }
                return { x, y };
            }

            // Обработчики событий мыши
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);

            // Обработчики touch-событий для мобильных устройств
            canvas.addEventListener('touchstart', startDrawing);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', stopDrawing);
            canvas.addEventListener('touchcancel', stopDrawing);

            // Инициализация PeerJS
            peer = new Peer();  // подключается к публичному серверу peerjs.com

            peer.on('open', function(id) {
                peerId = id;
                document.getElementById('peerIdDisplay').textContent = 'Ваш ID: ' + id;
            });

            // Обработка входящего соединения
            peer.on('connection', function(connection) {
                conn = connection;
                setupConnection(conn);
            });

            // Настройка соединения (общий код для входящего и исходящего)
            function setupConnection(connection) {
                conn = connection;
                conn.on('open', function() {
                    console.log('Соединение установлено');
                });
                conn.on('data', function(data) {
                    // Получены данные от друга – рисуем на своём холсте
                    if (data.type === 'start') {
                        ctx.beginPath();
                        ctx.moveTo(data.x, data.y);
                    } else if (data.type === 'draw') {
                        ctx.lineTo(data.x, data.y);
                        ctx.strokeStyle = 'black';
                        ctx.lineWidth = 2;
                        ctx.lineCap = 'round';
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(data.x, data.y);
                    } else if (data.type === 'stop') {
                        ctx.beginPath();
                    } else if (data.type === 'clear') {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                });
            }

            // Создаём соединение (по кнопке «Подключиться»)
            document.getElementById('connectBtn').addEventListener('click', function() {
                const friendId = document.getElementById('peerIdInput').value.trim();
                if (friendId) {
                    conn = peer.connect(friendId);
                    setupConnection(conn);
                }
            });

            // Кнопка очистки холста
            document.getElementById('clearBtn').addEventListener('click', function() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (conn && conn.open) {
                    conn.send({ type: 'clear' });
                }
            });

            // Кнопка «Создать соединение» просто показывает ID, но можно и автоматически копировать
            document.getElementById('createBtn').addEventListener('click', function() {
                // ID уже отображается, можно добавить копирование в буфер
                navigator.clipboard?.writeText(peerId).catch(() => {});
            });

        })();
    </script>
</body>
</html>
