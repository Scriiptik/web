<!DOCTYPE html>
<html>
<head>
    <title>Совместное рисование — надёжная версия</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        canvas {
            display: block;
            background: white;
            touch-action: none;
            width: 100vw;
            height: 100vh;
        }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.96);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,0,0,0.1);
            max-width: 320px;
            width: calc(100% - 40px);
            box-sizing: border-box;
            pointer-events: auto;
        }
        .control-group {
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        input, button {
            padding: 10px 14px;
            font-size: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }
        input {
            flex: 1;
            min-width: 150px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-weight: 500;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button:hover {
            background: #45a049;
        }
        button:active {
            transform: scale(0.98);
        }
        button#clearBtn {
            background: #f44336;
        }
        button#clearBtn:hover {
            background: #d32f2f;
        }
        #peerIdDisplay {
            font-weight: bold;
            word-break: break-all;
            background: #e3f2fd;
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 5px;
            border: 1px solid #bbdefb;
            font-size: 14px;
        }
        .note {
            font-size: 13px;
            color: #555;
            margin-top: 12px;
            line-height: 1.5;
            background: #f9f9f9;
            padding: 8px 10px;
            border-radius: 6px;
            border-left: 3px solid #4CAF50;
        }
        #status {
            font-size: 13px;
            color: #1976d2;
            margin-top: 8px;
            font-weight: 500;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="controls">
        <div class="control-group">
            <button id="createBtn">🎨 Создать комнату</button>
            <div id="peerIdDisplay">—</div>
        </div>
        <div class="control-group">
            <input type="text" id="peerIdInput" placeholder="ID друга (скопируйте у него)">
            <button id="connectBtn">🔗 Подключиться</button>
        </div>
        <div class="control-group">
            <button id="clearBtn">🗑 Очистить холст</button>
        </div>
        <div id="status">🟡 Инициализация...</div>
        <div class="note">
            <strong>Как пользоваться:</strong><br>
            1. Нажмите «Создать комнату» — появится ваш ID.<br>
            2. Отправьте этот ID другу (через мессенджер).<br>
            3. Друг вводит ваш ID и нажимает «Подключиться».<br>
            4. Рисуйте — линии появятся у обоих.
        </div>
    </div>

    <script>
        (function() {
            // ----- Элементы интерфейса -----
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const peerIdDisplay = document.getElementById('peerIdDisplay');
            const peerIdInput = document.getElementById('peerIdInput');
            const createBtn = document.getElementById('createBtn');
            const connectBtn = document.getElementById('connectBtn');
            const clearBtn = document.getElementById('clearBtn');
            const statusEl = document.getElementById('status');

            // ----- Состояние -----
            let drawing = false;
            let peer = null;          // экземпляр Peer
            let conn = null;          // активное соединение
            let myId = null;
            let reconnectTimer = null;

            // ----- Настройка холста -----
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ----- Получение координат (мышь/тач) -----
            function getCoordinates(e) {
                e.preventDefault();
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                return { x: clientX, y: clientY };
            }

            // ----- Функции рисования (локальные + отправка) -----
            function startDrawing(e) {
                e.preventDefault();
                drawing = true;
                const pos = getCoordinates(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                if (conn && conn.open) {
                    conn.send({ type: 'start', x: pos.x, y: pos.y });
                }
            }

            function draw(e) {
                e.preventDefault();
                if (!drawing) return;
                const pos = getCoordinates(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                if (conn && conn.open) {
                    conn.send({ type: 'draw', x: pos.x, y: pos.y });
                }
            }

            function stopDrawing(e) {
                e.preventDefault();
                drawing = false;
                ctx.beginPath();
                if (conn && conn.open) {
                    conn.send({ type: 'stop' });
                }
            }

            // ----- Привязка событий к холсту -----
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);

            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stopDrawing, { passive: false });
            canvas.addEventListener('touchcancel', stopDrawing, { passive: false });

            // ----- Настройка соединения (общая) -----
            function setupConnection(connection) {
                conn = connection;
                conn.on('open', () => {
                    statusEl.innerHTML = '🟢 Соединение установлено!';
                });
                conn.on('data', (data) => {
                    // Рисуем полученные данные
                    if (data.type === 'start') {
                        ctx.beginPath();
                        ctx.moveTo(data.x, data.y);
                    } else if (data.type === 'draw') {
                        ctx.lineTo(data.x, data.y);
                        ctx.strokeStyle = '#000000';
                        ctx.lineWidth = 3;
                        ctx.lineCap = 'round';
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(data.x, data.y);
                    } else if (data.type === 'stop') {
                        ctx.beginPath();
                    } else if (data.type === 'clear') {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                });
                conn.on('close', () => {
                    statusEl.innerHTML = '🔴 Соединение разорвано';
                    conn = null;
                });
                conn.on('error', (err) => {
                    console.error('Ошибка соединения:', err);
                    statusEl.innerHTML = '⚠️ Ошибка соединения';
                });
            }

            // ----- Список сигнальных серверов (для обхода блокировок) -----
            const servers = [
                { host: '0.peerjs.com', port: 443, path: '/', secure: true },
                { host: '1.peerjs.com', port: 443, path: '/', secure: true },
                { host: 'peerjs.com', port: 443, path: '/peerjs', secure: true },
                { host: 'cdn.peerjs.com', port: 443, path: '/', secure: true } // дополнительный
            ];

            let currentServerIndex = 0;

            function tryConnectToServer(index) {
                if (index >= servers.length) {
                    statusEl.innerHTML = '❌ Не удалось подключиться ни к одному серверу. Проверьте интернет.';
                    return;
                }

                const server = servers[index];
                statusEl.innerHTML = `🟡 Подключение к ${server.host}...`;

                // Создаём Peer с указанным сервером
                peer = new Peer(server);

                peer.on('open', (id) => {
                    myId = id;
                    peerIdDisplay.textContent = myId;
                    statusEl.innerHTML = `🟢 Подключено (сервер: ${server.host})`;
                    currentServerIndex = 0; // сбрасываем на будущее
                });

                peer.on('error', (err) => {
                    console.warn(`Сервер ${server.host} не ответил:`, err.type);
                    // Пробуем следующий сервер
                    peer.destroy();
                    tryConnectToServer(index + 1);
                });
            }

            // Запускаем попытки подключения при загрузке
            tryConnectToServer(0);

            // ----- Обработка входящего соединения -----
            peer.on('connection', (connection) => {
                setupConnection(connection);
            });

            // ----- Кнопка "Создать комнату" (копирует ID) -----
            createBtn.addEventListener('click', () => {
                if (myId) {
                    navigator.clipboard?.writeText(myId).then(() => {
                        alert('✅ Ваш ID скопирован в буфер! Отправьте его другу.');
                    }).catch(() => {
                        alert('📋 Ваш ID: ' + myId);
                    });
                } else {
                    alert('⏳ Инициализация... Подождите несколько секунд.');
                }
            });

            // ----- Кнопка "Подключиться" (инициируем соединение) -----
            connectBtn.addEventListener('click', () => {
                const friendId = peerIdInput.value.trim();
                if (!friendId) {
                    alert('Введите ID друга');
                    return;
                }
                if (!peer) {
                    alert('Peer не инициализирован');
                    return;
                }
                // Если уже есть соединение, закрываем его
                if (conn && conn.open) {
                    conn.close();
                }
                const connection = peer.connect(friendId);
                setupConnection(connection);
                statusEl.innerHTML = '🟡 Устанавливаем соединение...';
            });

            // ----- Кнопка очистки холста -----
            clearBtn.addEventListener('click', () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (conn && conn.open) {
                    conn.send({ type: 'clear' });
                }
            });

            // ----- Дополнительно: переподключение при потере Peer -----
            peer.on('disconnected', () => {
                statusEl.innerHTML = '🟠 Соединение с сервером потеряно. Пытаемся переподключиться...';
                // Пытаемся переподключиться через 2 секунды
                setTimeout(() => {
                    if (peer && !peer.disconnected) {
                        peer.reconnect();
                    } else {
                        // Если не удалось, перезапускаем цепочку серверов
                        tryConnectToServer(0);
                    }
                }, 2000);
            });

        })();
    </script>
</body>
</html>
