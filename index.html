<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Телефон как веб-камера через QR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0b0f14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: #1e242b;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            padding: 24px;
            color: #f0f4f8;
        }
        h2 { font-weight: 600; margin-bottom: 16px; color: white; }
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 24px;
            display: inline-block;
            margin: 16px 0;
        }
        #qrcode { display: flex; justify-content: center; }
        .status {
            background: #2a333d;
            border-radius: 40px;
            padding: 12px 20px;
            margin: 16px 0;
            color: #99c2ff;
            font-weight: 500;
        }
        .video-container {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin: 16px 0;
            aspect-ratio: 16/9;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .scanner-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: #2c3e50;
            border-radius: 24px;
            overflow: hidden;
            margin: 16px 0;
        }
        #preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn {
            background: #3a6ea5;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            max-width: 280px;
            margin: 8px auto;
            border: 1px solid #5f8bc9;
        }
        .btn:active { background: #2c4f7a; transform: scale(0.97); }
        .btn.danger { background: #b02e2e; border-color: #d66; }
        .hidden { display: none; }
        .info { color: #a0b3cc; font-size: 14px; margin-top: 16px; }
    </style>

    <!-- Библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/instascan@2.0.0-rc.1/dist/instascan.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="card">
        <!-- Десктоп (ПК) -->
        <div id="desktop-view" class="hidden">
            <h2>🖥️ Компьютер</h2>
            <p>Отсканируйте код камерой телефона</p>
            <div class="qr-container" id="qrcode"></div>
            <div class="status" id="desktop-status">Ожидание подключения...</div>
            <div id="desktop-video-box" class="video-container hidden">
                <video id="remote-video" autoplay playsinline></video>
            </div>
            <button class="btn" id="reset-desktop">🔄 Новый QR‑код</button>
            <div class="info">После подключения здесь появится видео с телефона</div>
        </div>

        <!-- Мобильный интерфейс -->
        <div id="mobile-view" class="hidden">
            <h2 id="mobile-title">📱 Телефон</h2>
            <!-- Режим сканера -->
            <div id="mobile-scanner" class="">
                <p>Наведите камеру на QR‑код с ПК</p>
                <div class="scanner-container">
                    <video id="preview"></video>
                </div>
                <div class="status" id="scanner-status">Сканирование...</div>
            </div>
            <!-- Режим трансляции -->
            <div id="mobile-streaming" class="hidden">
                <div class="video-container">
                    <video id="local-video" autoplay playsinline muted></video>
                </div>
                <div class="status" id="stream-status">🔴 Трансляция идёт</div>
                <button class="btn danger" id="stop-stream">⏹️ Остановить и выйти</button>
            </div>
            <div class="info" id="mobile-info"></div>
        </div>
    </div>

    <script>
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            // DOM
            const desktopView = document.getElementById('desktop-view');
            const mobileView = document.getElementById('mobile-view');
            const qrcodeDiv = document.getElementById('qrcode');
            const desktopStatus = document.getElementById('desktop-status');
            const remoteVideo = document.getElementById('remote-video');
            const remoteVideoBox = document.getElementById('desktop-video-box');
            const resetBtn = document.getElementById('reset-desktop');

            const mobileScanner = document.getElementById('mobile-scanner');
            const mobileStreaming = document.getElementById('mobile-streaming');
            const mobileTitle = document.getElementById('mobile-title');
            const scannerStatus = document.getElementById('scanner-status');
            const preview = document.getElementById('preview');
            const localVideo = document.getElementById('local-video');
            const streamStatus = document.getElementById('stream-status');
            const stopBtn = document.getElementById('stop-stream');
            const mobileInfo = document.getElementById('mobile-info');

            // Общие переменные
            let peer = null;
            let currentCall = null;      // активный звонок (медиа)
            let localStream = null;       // видеопоток с телефона
            let scanner = null;            // экземпляр Instascan

            // --- Вспомогательные функции ---
            function stopScanner() {
                if (scanner) {
                    scanner.stop().catch(e => console.warn('Остановка сканера', e));
                    scanner = null;
                }
            }

            // Остановить медиапоток
            function stopLocalStream() {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
            }

            // Полный сброс на мобильном
            function resetMobileToScanner(reason) {
                if (currentCall) currentCall.close();
                if (peer) peer.destroy();
                if (localStream) stopLocalStream();
                peer = null;
                currentCall = null;

                mobileScanner.classList.remove('hidden');
                mobileStreaming.classList.add('hidden');
                mobileTitle.textContent = '📱 Телефон';
                scannerStatus.textContent = reason || 'Сканирование...';
                // перезапустить сканер
                initMobileScanner();
            }

            // --- Получение параметра из URL ---
            function getConnectParam() {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('connect');
            }

            function removeConnectParam() {
                const url = new URL(window.location);
                url.searchParams.delete('connect');
                window.history.replaceState({}, document.title, url);
            }

            // --- Логика для ПК ---
            function initDesktop() {
                if (peer) peer.destroy();
                peer = new Peer();

                peer.on('open', (id) => {
                    desktopStatus.textContent = `ID: ${id}`;
                    const connectUrl = `${window.location.origin}${window.location.pathname}?connect=${id}`;
                    qrcodeDiv.innerHTML = '';
                    new QRCode(qrcodeDiv, {
                        text: connectUrl,
                        width: 250,
                        height: 250,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                });

                peer.on('call', (call) => {
                    // Входящий звонок от телефона
                    desktopStatus.textContent = '📞 Входящий вызов...';
                    call.answer(); // отвечаем, не передавая свой поток (ПК не отправляет видео)

                    call.on('stream', (remoteStream) => {
                        // Получили видеопоток с телефона
                        remoteVideo.srcObject = remoteStream;
                        remoteVideo.play().catch(e => console.warn(e));
                        remoteVideoBox.classList.remove('hidden');
                        desktopStatus.textContent = '✅ Трансляция с телефона';
                    });

                    call.on('close', () => {
                        remoteVideo.srcObject = null;
                        remoteVideoBox.classList.add('hidden');
                        desktopStatus.textContent = '❌ Телефон отключился';
                        currentCall = null;
                    });

                    currentCall = call;
                });

                peer.on('error', (err) => {
                    desktopStatus.textContent = 'Ошибка: ' + err.type;
                    console.error(err);
                });
            }

            resetBtn.addEventListener('click', () => {
                if (peer) peer.destroy();
                if (currentCall) currentCall.close();
                remoteVideo.srcObject = null;
                remoteVideoBox.classList.add('hidden');
                qrcodeDiv.innerHTML = '';
                desktopStatus.textContent = 'Генерируем новый код...';
                initDesktop();
            });

            // --- Мобильная часть: запуск трансляции на переданный ID ---
            async function startStreamingAndCall(remoteId) {
                stopScanner();
                mobileScanner.classList.add('hidden');
                mobileStreaming.classList.remove('hidden');
                streamStatus.textContent = '⏳ Запрос доступа к камере...';

                try {
                    // Запрашиваем доступ к камере (задняя, если возможно)
                    const constraints = {
                        video: { facingMode: { ideal: 'environment' } }, // предпочтение задней камере
                        audio: false
                    };
                    localStream = await navigator.mediaDevices.getUserMedia(constraints);
                    localVideo.srcObject = localStream;
                    streamStatus.textContent = '🔴 Подключение...';

                    if (peer) peer.destroy();
                    peer = new Peer();

                    peer.on('open', () => {
                        // Совершаем звонок на remoteId
                        const call = peer.call(remoteId, localStream);
                        currentCall = call;

                        call.on('close', () => {
                            resetMobileToScanner('Соединение закрыто');
                        });

                        call.on('error', (err) => {
                            console.error('Call error', err);
                            resetMobileToScanner('Ошибка соединения');
                        });

                        streamStatus.textContent = '✅ Трансляция активна';
                    });

                    peer.on('error', (err) => {
                        console.error('Peer error', err);
                        resetMobileToScanner('Ошибка Peer');
                    });

                } catch (err) {
                    console.error('getUserMedia error', err);
                    streamStatus.textContent = '❌ Нет доступа к камере';
                    mobileInfo.textContent = 'Разрешите доступ к камере и повторите';
                    // Возврат к сканеру через кнопку?
                }
            }

            // --- Инициализация сканера на телефоне ---
            function initMobileScanner() {
                if (!preview) return;
                stopScanner();

                scanner = new Instascan.Scanner({ video: preview, mirror: false, scanPeriod: 2 });
                scanner.addListener('scan', (content) => {
                    scannerStatus.textContent = 'QR найден!';
                    try {
                        const url = new URL(content);
                        const connectId = url.searchParams.get('connect');
                        if (connectId) {
                            stopScanner();
                            startStreamingAndCall(connectId);
                        } else {
                            scannerStatus.textContent = 'Неверный QR (нет ID)';
                        }
                    } catch (e) {
                        scannerStatus.textContent = 'Не является ссылкой';
                    }
                });

                Instascan.Camera.getCameras().then((cameras) => {
                    if (cameras.length > 0) {
                        const rear = cameras.find(c => c.name.toLowerCase().includes('back') || c.name.toLowerCase().includes('rear'));
                        scanner.start(rear || cameras[0]);
                        scannerStatus.textContent = 'Камера готова';
                    } else {
                        scannerStatus.textContent = 'Камера не найдена';
                    }
                }).catch((err) => {
                    scannerStatus.textContent = 'Ошибка доступа к камере';
                    console.error(err);
                });
            }

            // Кнопка остановки трансляции на телефоне
            stopBtn.addEventListener('click', () => {
                resetMobileToScanner('Трансляция остановлена');
            });

            // --- Инициализация в зависимости от устройства и параметров ---
            function init() {
                if (isMobile) {
                    mobileView.classList.remove('hidden');
                    desktopView.classList.add('hidden');

                    const connectId = getConnectParam();
                    if (connectId) {
                        // Если открыто по ссылке с параметром — сразу начинаем трансляцию
                        removeConnectParam();
                        startStreamingAndCall(connectId);
                    } else {
                        // Обычный режим: сканер
                        resetMobileToScanner('Готов к сканированию');
                    }
                } else {
                    desktopView.classList.remove('hidden');
                    mobileView.classList.add('hidden');
                    initDesktop();
                }
            }

            // Запуск
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // Очистка при уходе
            window.addEventListener('beforeunload', () => {
                if (peer) peer.destroy();
                if (localStream) stopLocalStream();
                stopScanner();
            });
        })();
    </script>
</body>
</html>
