<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram‑like Messenger</title>
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-analytics-compat.js"></script>
    <style>
        /* ----- СБРОС И ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ (стиль Telegram) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f8fa;
            --bg-sidebar: #ffffff;
            --text-primary: #0d0e12;
            --text-secondary: #707579;
            --accent: #3390ec;
            --accent-hover: #2a7ac9;
            --border-light: #e9ecef;
            --message-out: #eafff0;
            --message-in: #ffffff;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 2px 6px rgba(0,0,0,0.05);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body.dark-theme {
            --bg-primary: #1f2128;
            --bg-secondary: #181a20;
            --bg-sidebar: #1f2128;
            --text-primary: #e7e7e7;
            --text-secondary: #9b9fa8;
            --accent: #5e94ff;
            --accent-hover: #4a7ad9;
            --border-light: #2f3139;
            --message-out: #2b5278;
            --message-in: #2f3139;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 2px 6px rgba(0,0,0,0.4);
        }

        body {
            background: var(--bg-secondary);
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100dvh;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        /* ----- СКРОЛЛБАРЫ (аккуратные) ----- */
        .scrollable {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: var(--text-secondary) transparent;
        }
        .scrollable::-webkit-scrollbar {
            width: 5px;
        }
        .scrollable::-webkit-scrollbar-thumb {
            background: var(--text-secondary);
            border-radius: 10px;
        }
        .scrollable::-webkit-scrollbar-track {
            background: transparent;
        }

        /* ----- АУТЕНТИФИКАЦИЯ (минимализм) ----- */
        .auth-container {
            max-width: 380px;
            margin: auto;
            padding: 2rem;
            width: 100%;
            text-align: center;
        }
        .auth-logo {
            font-size: 2rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 2rem;
        }
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-light);
        }
        .auth-tab {
            padding: 0.75rem 0;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            flex: 1;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        .auth-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .auth-form input {
            padding: 0.9rem 1.2rem;
            border: 1px solid var(--border-light);
            border-radius: 1.5rem;
            font-size: 1rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            outline: none;
            transition: border 0.2s;
        }
        .auth-form input:focus {
            border-color: var(--accent);
        }
        .auth-form button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-form button:hover {
            background: var(--accent-hover);
        }

        /* ----- ШАПКА ПРИЛОЖЕНИЯ ----- */
        .app-header {
            padding: 0.5rem 1rem;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            flex-shrink: 0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .burger-menu {
            font-size: 1.8rem;
            line-height: 1;
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .burger-menu:hover {
            background: var(--bg-secondary);
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .email-badge {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
        .theme-toggle:hover {
            background: var(--bg-secondary);
        }
        .logout-btn {
            background: none;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: var(--bg-secondary);
        }

        /* ----- БОКОВОЕ МЕНЮ (бургер) ----- */
        .nav-drawer {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: var(--bg-sidebar);
            transition: left 0.25s ease;
            z-index: 2000;
            padding: 1rem;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
        }
        .nav-drawer.open {
            left: 0;
        }
        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        .close-drawer {
            font-size: 1.8rem;
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
        }
        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .nav-item {
            padding: 1rem;
            border-radius: 0.8rem;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-item:hover {
            background: var(--bg-secondary);
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 1999;
        }
        .overlay.show {
            display: block;
        }

        /* ----- ОСНОВНОЙ КОНТЕНТ (секции) ----- */
        .main-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: var(--bg-primary);
        }
        .section {
            display: none;
            height: 100%;
            width: 100%;
        }
        .section.active {
            display: flex;
            flex-direction: column;
        }

        /* ----- КАРТОЧКИ (минимализм) ----- */
        .card {
            background: var(--bg-primary);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border-light);
            margin-bottom: 1rem;
        }

        /* ----- ПРОФИЛЬ ----- */
        .profile-header {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: 500;
            flex-shrink: 0;
            object-fit: cover;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-info h2 {
            font-size: 1.5rem;
            color: var(--text-primary);
        }
        .profile-info p {
            color: var(--text-secondary);
            margin: 0.5rem 0;
        }
        .stats {
            display: flex;
            gap: 2rem;
            color: var(--text-secondary);
        }
        .stats span {
            font-weight: 600;
            color: var(--text-primary);
        }
        .friend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            background: var(--bg-secondary);
            border-radius: 2rem;
            cursor: pointer;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .friend-avatar {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
        }

        /* ----- ПОИСК ----- */
        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border: 1px solid var(--border-light);
            border-radius: 2rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            outline: none;
        }
        .user-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-light);
        }
        .user-card .info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .mini-avatar {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
            font-size: 1.2rem;
        }

        /* ----- ЧАТЫ (основной интерфейс как в Telegram) ----- */
        #chatsSection {
            flex-direction: row;
        }
        /* Левая панель (список чатов) */
        .chats-sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-light);
        }
        .sidebar-header h3 {
            font-weight: 600;
            color: var(--text-primary);
        }
        .sidebar-search {
            padding: 1rem;
            border-bottom: 1px solid var(--border-light);
        }
        .sidebar-search input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-light);
            border-radius: 2rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            outline: none;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 2px;
        }
        .chat-item:hover {
            background: var(--bg-secondary);
        }
        .chat-item.active {
            background: var(--bg-secondary);
        }
        .chat-avatar {
            width: 54px;
            height: 54px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.4rem;
            flex-shrink: 0;
            object-fit: cover;
        }
        .chat-info {
            flex: 1;
            overflow: hidden;
        }
        .chat-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .chat-last-message {
            color: var(--text-secondary);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-time {
            color: var(--text-secondary);
            font-size: 0.75rem;
            align-self: flex-start;
        }

        /* Правая область (окно чата) */
        .chat-main {
            flex: 1;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--bg-sidebar);
        }
        .back-button {
            display: none;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--accent);
            cursor: pointer;
            width: 40px;
            height: 40px;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .back-button:hover {
            background: var(--bg-secondary);
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .message {
            max-width: 75%;
            padding: 0.6rem 1rem;
            border-radius: 1.2rem;
            background: var(--message-in);
            color: var(--text-primary);
            align-self: flex-start;
            word-wrap: break-word;
            box-shadow: var(--shadow-sm);
        }
        .message.own {
            background: var(--message-out);
            align-self: flex-end;
        }
        .message-sender {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.2rem;
        }
        .message-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
            text-align: right;
        }
        .message-media {
            max-width: 200px;
            max-height: 200px;
            border-radius: 0.8rem;
            cursor: pointer;
        }
        .message-audio {
            width: 200px;
        }
        .chat-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--bg-sidebar);
            border-top: 1px solid var(--border-light);
            align-items: center;
            flex-wrap: wrap;
            padding-bottom: max(0.75rem, var(--safe-bottom));
        }
        .chat-input-area input[type="text"] {
            flex: 1;
            min-width: 150px;
            padding: 0.8rem 1.2rem;
            border: 1px solid var(--border-light);
            border-radius: 2rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            outline: none;
        }
        .chat-input-area button {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--accent);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .chat-input-area button:hover {
            background: var(--bg-secondary);
        }
        .chat-input-area button.record-btn {
            color: #ff4d4d;
        }
        .emoji-picker {
            position: absolute;
            bottom: 80px;
            right: 10px;
            z-index: 1000;
            display: none;
            background: var(--bg-sidebar);
            border-radius: 1rem;
            box-shadow: var(--shadow-md);
        }
        .emoji-picker.show {
            display: block;
        }

        /* ----- МОДАЛКА ДРУГА ----- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: var(--bg-primary);
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 300px;
            text-align: center;
        }
        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }
        .modal-buttons button {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 2rem;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }
        .modal-buttons button.secondary {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border-light);
        }

        /* ----- АДАПТАЦИЯ ПОД МОБИЛЬНЫЕ (как в Telegram) ----- */
        @media (max-width: 768px) {
            .chats-sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 100%;
                z-index: 100;
                transform: translateX(0);
                transition: transform 0.25s ease;
            }
            .chats-sidebar.hide-mobile {
                transform: translateX(-100%);
            }
            .chat-main {
                width: 100%;
            }
            .back-button {
                display: flex;
            }
        }

        .hidden {
            display: none !important;
        }
        .info-message {
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
        }
        .flex-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- БЛОК АУТЕНТИФИКАЦИИ -->
        <div id="authContainer" class="auth-container">
            <div class="auth-logo">Messenger</div>
            <div class="auth-tabs">
                <button id="loginTab" class="auth-tab active">Вход</button>
                <button id="registerTab" class="auth-tab">Регистрация</button>
            </div>
            <div id="loginForm" class="auth-form">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="loginBtn">Войти</button>
            </div>
            <div id="registerForm" class="auth-form hidden">
                <input type="email" id="registerEmail" placeholder="Email">
                <input type="password" id="registerPassword" placeholder="Пароль">
                <button id="registerBtn">Зарегистрироваться</button>
            </div>
        </div>

        <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
        <div id="appContainer" class="hidden">
            <div class="app-header">
                <div class="header-left">
                    <button id="burgerMenu" class="burger-menu">☰</button>
                    <span class="logo">Messenger</span>
                </div>
                <div class="user-info">
                    <span class="email-badge" id="headerEmail"></span>
                    <button id="themeToggle" class="theme-toggle">🌙</button>
                    <button id="logoutBtn" class="logout-btn">Выйти</button>
                </div>
            </div>

            <!-- Боковое меню (бургер) -->
            <div id="navDrawer" class="nav-drawer">
                <div class="drawer-header">
                    <span class="logo">Меню</span>
                    <button id="closeDrawer" class="close-drawer">✕</button>
                </div>
                <div class="nav-items">
                    <div class="nav-item" id="drawerFeed">Лента</div>
                    <div class="nav-item" id="drawerProfile">Профиль</div>
                    <div class="nav-item" id="drawerSearch">Поиск</div>
                    <div class="nav-item" id="drawerChats">Чаты</div>
                </div>
            </div>
            <div id="overlay" class="overlay"></div>

            <div class="main-content">
                <!-- Лента -->
                <div id="feedSection" class="section">
                    <div class="section-content scrollable">
                        <div class="card">
                            <h3 style="margin-bottom:1rem;">Новый пост</h3>
                            <textarea id="postText" rows="3" placeholder="Что у вас нового?" style="width:100%; padding:0.8rem; border-radius:1rem; border:1px solid var(--border-light); background:var(--bg-secondary); color:var(--text-primary);"></textarea>
                            <button id="createPostBtn" style="margin-top:1rem; background:var(--accent); color:white; border:none; padding:0.8rem; border-radius:2rem;">Опубликовать</button>
                        </div>
                        <div id="feedPosts"></div>
                    </div>
                </div>

                <!-- Профиль -->
                <div id="profileSection" class="section">
                    <div class="section-content scrollable" id="profileContainer"></div>
                </div>

                <!-- Поиск -->
                <div id="searchSection" class="section">
                    <div class="section-content scrollable">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Имя или email...">
                            <button id="searchBtn" style="background:var(--accent); color:white; border:none; padding:0.8rem 1.5rem; border-radius:2rem;">Найти</button>
                        </div>
                        <div id="searchResults"></div>
                    </div>
                </div>

                <!-- Чаты (Telegram-стиль) -->
                <div id="chatsSection" class="section">
                    <!-- Левая панель списка чатов -->
                    <div class="chats-sidebar" id="chatsSidebar">
                        <div class="sidebar-header">
                            <h3>Чаты</h3>
                        </div>
                        <div class="sidebar-search">
                            <input type="text" id="chatSearchInput" placeholder="Поиск...">
                        </div>
                        <div class="chats-list scrollable" id="chatsList"></div>
                    </div>
                    <!-- Правая область сообщений -->
                    <div class="chat-main" id="chatMain">
                        <div id="noChatSelected" class="info-message" style="display: flex; align-items: center; justify-content: center; height:100%;">
                            Выберите чат
                        </div>
                        <div id="chatWindowContainer" class="hidden" style="height:100%; display: flex; flex-direction: column;">
                            <div class="chat-header">
                                <button id="backFromChatBtn" class="back-button">←</button>
                                <span id="chatHeader"></span>
                            </div>
                            <div id="messagesContainer" class="messages-container scrollable"></div>
                            <div class="chat-input-area">
                                <button id="emojiBtn">😊</button>
                                <input type="text" id="messageInput" placeholder="Сообщение...">
                                <button id="attachBtn">📎</button>
                                <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
                                <button id="recordBtn" class="record-btn">🎤</button>
                                <button id="sendMessageBtn" style="background:var(--accent); color:white; border-radius:50%;">➤</button>
                            </div>
                            <div id="emojiPicker" class="emoji-picker"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка друга -->
    <div id="friendModal" class="modal">
        <div class="modal-content">
            <h3 id="friendModalName">Друг</h3>
            <div class="modal-buttons">
                <button id="modalMessageBtn">✉ Написать</button>
                <button id="modalProfileBtn">👤 Профиль</button>
                <button class="secondary" id="modalCloseBtn">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- Firebase config ----------
            const firebaseConfig = {
                apiKey: "AIzaSyBw-Jv_Kp6UijGT4giu1DCO-kAXtlU-y5w",
                authDomain: "webs-a50d2.firebaseapp.com",
                projectId: "webs-a50d2",
                storageBucket: "webs-a50d2.firebasestorage.app",
                messagingSenderId: "615777470967",
                appId: "1:615777470967:web:9b35c8edd98f6925bc06f2",
                measurementId: "G-P1FY1HJDTK"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            const storage = firebase.storage();

            // ---------- Глобальное состояние (упрощённое) ----------
            let state = {
                currentUser: null,
                profile: null,
                followees: [],
                currentChatId: null,
                currentChatParticipant: null,
                darkTheme: localStorage.getItem('theme') === 'dark',
                listeners: {
                    feed: null,
                    profilePosts: null,
                    follows: null,
                    chats: null,
                    messages: null
                }
            };

            // ---------- DOM элементы ----------
            const authContainer = document.getElementById('authContainer');
            const appContainer = document.getElementById('appContainer');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginBtn = document.getElementById('loginBtn');
            const registerBtn = document.getElementById('registerBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const headerEmail = document.getElementById('headerEmail');
            const themeToggle = document.getElementById('themeToggle');
            const burgerMenu = document.getElementById('burgerMenu');
            const navDrawer = document.getElementById('navDrawer');
            const overlay = document.getElementById('overlay');
            const closeDrawer = document.getElementById('closeDrawer');
            const drawerFeed = document.getElementById('drawerFeed');
            const drawerProfile = document.getElementById('drawerProfile');
            const drawerSearch = document.getElementById('drawerSearch');
            const drawerChats = document.getElementById('drawerChats');
            const feedSection = document.getElementById('feedSection');
            const profileSection = document.getElementById('profileSection');
            const searchSection = document.getElementById('searchSection');
            const chatsSection = document.getElementById('chatsSection');
            const postText = document.getElementById('postText');
            const createPostBtn = document.getElementById('createPostBtn');
            const feedPosts = document.getElementById('feedPosts');
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const searchResults = document.getElementById('searchResults');
            const chatsSidebar = document.getElementById('chatsSidebar');
            const chatSearchInput = document.getElementById('chatSearchInput');
            const chatsList = document.getElementById('chatsList');
            const chatWindowContainer = document.getElementById('chatWindowContainer');
            const noChatSelected = document.getElementById('noChatSelected');
            const messagesContainer = document.getElementById('messagesContainer');
            const messageInput = document.getElementById('messageInput');
            const sendMessageBtn = document.getElementById('sendMessageBtn');
            const emojiBtn = document.getElementById('emojiBtn');
            const attachBtn = document.getElementById('attachBtn');
            const fileInput = document.getElementById('fileInput');
            const recordBtn = document.getElementById('recordBtn');
            const emojiPicker = document.getElementById('emojiPicker');
            const chatHeader = document.getElementById('chatHeader');
            const backFromChatBtn = document.getElementById('backFromChatBtn');
            const friendModal = document.getElementById('friendModal');
            const friendModalName = document.getElementById('friendModalName');
            const modalMessageBtn = document.getElementById('modalMessageBtn');
            const modalProfileBtn = document.getElementById('modalProfileBtn');
            const modalCloseBtn = document.getElementById('modalCloseBtn');
            let selectedFriendUid = null;

            // ---------- Тема ----------
            function applyTheme() {
                if (state.darkTheme) {
                    document.body.classList.add('dark-theme');
                    themeToggle.textContent = '☀️';
                } else {
                    document.body.classList.remove('dark-theme');
                    themeToggle.textContent = '🌙';
                }
                localStorage.setItem('theme', state.darkTheme ? 'dark' : 'light');
            }
            applyTheme();
            themeToggle.addEventListener('click', () => {
                state.darkTheme = !state.darkTheme;
                applyTheme();
            });

            // ---------- Бургер-меню ----------
            function openDrawer() { navDrawer.classList.add('open'); overlay.classList.add('show'); }
            function closeDrawer() { navDrawer.classList.remove('open'); overlay.classList.remove('show'); }
            burgerMenu.addEventListener('click', openDrawer);
            closeDrawer.addEventListener('click', closeDrawer);
            overlay.addEventListener('click', closeDrawer);

            // ---------- Управление секциями ----------
            function showSection(sectionId) {
                feedSection.classList.remove('active');
                profileSection.classList.remove('active');
                searchSection.classList.remove('active');
                chatsSection.classList.remove('active');
                document.getElementById(sectionId).classList.add('active');
                closeDrawer();

                // При переходе в чаты: показываем список, скрываем окно чата
                if (sectionId === 'chatsSection') {
                    // На мобильных гарантируем, что список виден
                    if (window.innerWidth <= 768) {
                        chatsSidebar.classList.remove('hide-mobile');
                    }
                    chatWindowContainer.classList.add('hidden');
                    noChatSelected.classList.remove('hidden');
                    if (state.currentChatId) {
                        if (state.listeners.messages) state.listeners.messages();
                        state.currentChatId = null;
                    }
                    loadChats();
                }
            }

            drawerFeed.addEventListener('click', () => { showSection('feedSection'); loadFeed(); });
            drawerProfile.addEventListener('click', () => { showSection('profileSection'); loadProfile(state.currentUser.uid); });
            drawerSearch.addEventListener('click', () => { showSection('searchSection'); searchResults.innerHTML = ''; });
            drawerChats.addEventListener('click', () => { showSection('chatsSection'); });

            // ---------- Работа с профилем ----------
            async function ensureUserProfile(user) {
                if (!user) return;
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                if (!doc.exists) {
                    await userRef.set({
                        email: user.email,
                        displayName: user.email.split('@')[0],
                        bio: '',
                        avatar: '',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                userRef.onSnapshot((snap) => {
                    if (snap.exists) {
                        state.profile = snap.data();
                        headerEmail.textContent = state.profile.displayName || state.currentUser.email;
                    }
                });
            }

            // ---------- Лента ----------
            function loadFeed() {
                if (!state.currentUser) return;
                if (state.listeners.follows) state.listeners.follows();
                const followsQuery = db.collection('follows').where('followerId', '==', state.currentUser.uid);
                state.listeners.follows = followsQuery.onSnapshot(async (snapshot) => {
                    state.followees = snapshot.docs.map(d => d.data().followeeId);
                    if (state.followees.length === 0) {
                        feedPosts.innerHTML = '<div class="info-message">Вы ни на кого не подписаны. Найдите авторов в поиске!</div>';
                        return;
                    }
                    const chunk = state.followees.slice(0, 10);
                    const postsQuery = db.collection('posts')
                        .where('userId', 'in', chunk)
                        .orderBy('timestamp', 'desc');
                    if (state.listeners.feed) state.listeners.feed();
                    state.listeners.feed = postsQuery.onSnapshot((snap) => renderFeed(snap.docs), err => {
                        feedPosts.innerHTML = `<div class="info-message">Ошибка загрузки ленты: ${err.message}</div>`;
                    });
                });
            }

            async function renderFeed(docs) {
                if (!docs.length) { feedPosts.innerHTML = '<div class="info-message">В ленте пока нет постов.</div>'; return; }
                const authorIds = [...new Set(docs.map(d => d.data().userId))];
                const authorSnaps = await Promise.all(authorIds.map(id => db.collection('users').doc(id).get()));
                const authors = Object.fromEntries(authorSnaps.map(snap => [snap.id, snap.data()]));
                let html = '';
                docs.forEach(doc => {
                    const post = doc.data();
                    const author = authors[post.userId] || { displayName: 'Неизвестно' };
                    const time = post.timestamp ? new Date(post.timestamp.toDate()).toLocaleString() : '';
                    const likes = post.likes?.length || 0;
                    const userLiked = post.likes?.includes(state.currentUser.uid);
                    html += `<div class="post card" data-post-id="${doc.id}">
                        <div class="post-header"><span class="post-author">${author.displayName}</span><span class="post-time">${time}</span></div>
                        <div class="post-text">${post.text.replace(/</g, '&lt;')}</div>
                        <div class="post-actions"><button class="like-btn ${userLiked ? 'liked' : ''}" data-post-id="${doc.id}">❤️ <span class="likes-count">${likes}</span></button></div>
                    </div>`;
                });
                feedPosts.innerHTML = html;
                document.querySelectorAll('.like-btn').forEach(btn => btn.addEventListener('click', e => toggleLike(btn.dataset.postId)));
            }

            async function toggleLike(postId) {
                if (!state.currentUser) return;
                const postRef = db.collection('posts').doc(postId);
                const post = await postRef.get();
                if (!post.exists) return;
                const likes = post.data().likes || [];
                if (likes.includes(state.currentUser.uid)) {
                    await postRef.update({ likes: firebase.firestore.FieldValue.arrayRemove(state.currentUser.uid) });
                } else {
                    await postRef.update({ likes: firebase.firestore.FieldValue.arrayUnion(state.currentUser.uid) });
                }
            }

            createPostBtn.addEventListener('click', async () => {
                const text = postText.value.trim();
                if (!text) return;
                await db.collection('posts').add({
                    userId: state.currentUser.uid,
                    text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: []
                });
                postText.value = '';
            });

            // ---------- Профиль ----------
            async function loadProfile(uid) {
                const container = document.getElementById('profileContainer');
                container.innerHTML = '<div class="info-message">Загрузка...</div>';
                const userDoc = await db.collection('users').doc(uid).get();
                if (!userDoc.exists) return;
                if (state.listeners.profilePosts) state.listeners.profilePosts();
                const postsQuery = db.collection('posts').where('userId', '==', uid).orderBy('timestamp', 'desc');
                state.listeners.profilePosts = postsQuery.onSnapshot(async (snap) => {
                    const followers = (await db.collection('follows').where('followeeId', '==', uid).get()).size;
                    const following = (await db.collection('follows').where('followerId', '==', uid).get()).size;
                    let isFollowing = false;
                    if (state.currentUser && uid !== state.currentUser.uid) {
                        const followDoc = await db.collection('follows').doc(`${state.currentUser.uid}_${uid}`).get();
                        isFollowing = followDoc.exists;
                    }
                    renderProfile(uid, userDoc.data(), snap.docs, followers, following, isFollowing);
                });
            }

            function renderProfile(uid, userData, postsDocs, followers, following, isFollowing) {
                const container = document.getElementById('profileContainer');
                const isOwn = uid === state.currentUser.uid;
                const avatarLetter = (userData.displayName || userData.email || '?')[0].toUpperCase();
                const avatarHtml = userData.avatar ? `<img src="${userData.avatar}" class="avatar-img">` : avatarLetter;
                const followBtn = !isOwn ? `<button class="follow-btn ${isFollowing ? 'secondary' : ''}" data-uid="${uid}">${isFollowing ? 'Отписаться' : 'Подписаться'}</button>` : '';
                const messageBtn = !isOwn ? `<button class="secondary" data-message-uid="${uid}">✉ Написать</button>` : '';
                const editBtn = isOwn ? '<button id="editProfileBtn" class="secondary">✎ Редактировать</button>' : '';
                let postsHtml = postsDocs.map(doc => {
                    const p = doc.data();
                    const time = p.timestamp ? new Date(p.timestamp.toDate()).toLocaleString() : '';
                    return `<div class="post"><div class="post-text">${p.text}</div><div class="post-time">${time}</div></div>`;
                }).join('') || '<p>Нет постов</p>';
                container.innerHTML = `
                    <div class="card">
                        <div class="profile-header">
                            <div class="avatar">${avatarHtml}</div>
                            <div class="profile-info">
                                <h2>${userData.displayName || 'Без имени'}</h2>
                                <p>${userData.bio || ''}</p>
                                <div class="stats"><span>${followers}</span> подписчиков <span>${following}</span> подписок</div>
                                <div class="flex-row" style="margin-top:1rem;">${followBtn} ${messageBtn} ${editBtn}</div>
                            </div>
                        </div>
                    </div>
                    <div class="card"><h3>Посты</h3>${postsHtml}</div>
                `;
                if (!isOwn) {
                    document.querySelector('[data-message-uid]')?.addEventListener('click', () => openChatWithUser(uid));
                    document.querySelector('.follow-btn')?.addEventListener('click', e => toggleFollow(uid, isFollowing));
                } else {
                    document.getElementById('editProfileBtn')?.addEventListener('click', showEditForm);
                }
            }

            async function toggleFollow(targetUid, currently) {
                const id = `${state.currentUser.uid}_${targetUid}`;
                if (currently) await db.collection('follows').doc(id).delete();
                else await db.collection('follows').doc(id).set({ followerId: state.currentUser.uid, followeeId: targetUid, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            }

            function showEditForm() {
                // упрощённо: можно сделать модалку, но для краткости оставим как есть
                alert('Редактирование профиля (можно расширить)');
            }

            // ---------- Поиск ----------
            searchBtn.addEventListener('click', () => searchUsers(searchInput.value));
            searchInput.addEventListener('keyup', e => e.key === 'Enter' && searchUsers(searchInput.value));

            async function searchUsers(query) {
                if (!query.trim()) return;
                searchResults.innerHTML = '<div class="info-message">Поиск...</div>';
                const nameQuery = db.collection('users').orderBy('displayName').startAt(query).endAt(query + '\uf8ff').get();
                const emailQuery = db.collection('users').orderBy('email').startAt(query).endAt(query + '\uf8ff').get();
                const [nameSnap, emailSnap] = await Promise.all([nameQuery, emailQuery]);
                const users = new Map();
                nameSnap.docs.forEach(d => users.set(d.id, d.data()));
                emailSnap.docs.forEach(d => users.set(d.id, d.data()));
                if (!users.size) { searchResults.innerHTML = '<div class="info-message">Ничего не найдено</div>'; return; }
                let html = '';
                for (let [uid, data] of users.entries()) {
                    if (uid === state.currentUser.uid) continue;
                    const isFollowing = state.followees.includes(uid);
                    html += `<div class="user-card">
                        <div class="info"><div class="mini-avatar">${data.avatar ? `<img src="${data.avatar}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">` : (data.displayName?.[0] || '?')}</div>
                        <div><h4 class="user-name-link" data-uid="${uid}">${data.displayName || data.email}</h4><small>${data.email}</small></div></div>
                        <div><button class="follow-btn ${isFollowing ? 'secondary' : ''}" data-follow-uid="${uid}">${isFollowing ? '✓' : '+'}</button>
                        <button class="secondary" data-message-uid="${uid}">✉</button></div>
                    </div>`;
                }
                searchResults.innerHTML = html;
                document.querySelectorAll('.follow-btn').forEach(b => b.addEventListener('click', async e => {
                    const uid = b.dataset.followUid;
                    await toggleFollow(uid, b.classList.contains('secondary'));
                    searchUsers(searchInput.value);
                }));
                document.querySelectorAll('[data-message-uid]').forEach(b => b.addEventListener('click', e => openChatWithUser(b.dataset.messageUid)));
                document.querySelectorAll('.user-name-link').forEach(span => span.addEventListener('click', e => goToUserProfile(span.dataset.uid)));
            }

            // ---------- Чаты ----------
            async function getOrCreateChat(otherUid) {
                const currentUid = state.currentUser.uid;
                const chatsRef = db.collection('chats');
                const snapshot = await chatsRef.where('participants', 'array-contains', currentUid).get();
                let chat = null;
                snapshot.forEach(doc => {
                    if (doc.data().participants.includes(otherUid)) chat = { id: doc.id, ...doc.data() };
                });
                if (!chat) {
                    const newChat = await chatsRef.add({
                        participants: [currentUid, otherUid],
                        lastMessage: '',
                        lastMessageTimestamp: null,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    chat = { id: newChat.id, participants: [currentUid, otherUid] };
                }
                return chat;
            }

            async function openChatWithUser(otherUid) {
                const chat = await getOrCreateChat(otherUid);
                state.currentChatId = chat.id;
                const userDoc = await db.collection('users').doc(otherUid).get();
                state.currentChatParticipant = { uid: otherUid, ...userDoc.data() };
                showSection('chatsSection');
                // на мобильных скрываем список, показываем окно чата
                if (window.innerWidth <= 768) {
                    chatsSidebar.classList.add('hide-mobile');
                }
                chatWindowContainer.classList.remove('hidden');
                noChatSelected.classList.add('hidden');
                chatHeader.textContent = `Чат с ${state.currentChatParticipant.displayName || state.currentChatParticipant.email}`;
                loadMessages(chat.id);
                loadChats(); // обновить список и подсветить активный
            }

            function loadChats() {
                if (!state.currentUser) return;
                if (state.listeners.chats) state.listeners.chats();
                const q = db.collection('chats').where('participants', 'array-contains', state.currentUser.uid).orderBy('updatedAt', 'desc');
                state.listeners.chats = q.onSnapshot(async snap => {
                    const chats = await Promise.all(snap.docs.map(async doc => {
                        const chat = { id: doc.id, ...doc.data() };
                        const otherUid = chat.participants.find(uid => uid !== state.currentUser.uid);
                        const user = await db.collection('users').doc(otherUid).get();
                        return { ...chat, otherUser: { uid: otherUid, ...user.data() } };
                    }));
                    renderChatsList(chats);
                });
            }

            function renderChatsList(chats) {
                if (!chats.length) { chatsList.innerHTML = '<div class="info-message">Нет чатов</div>'; return; }
                let html = '';
                chats.forEach(chat => {
                    const lastMsg = chat.lastMessage || 'Нет сообщений';
                    const time = chat.lastMessageTimestamp ? new Date(chat.lastMessageTimestamp.toDate()).toLocaleTimeString() : '';
                    const activeClass = chat.id === state.currentChatId ? 'active' : '';
                    html += `<div class="chat-item ${activeClass}" data-chat-id="${chat.id}" data-other-uid="${chat.otherUser.uid}">
                        <div class="chat-avatar">${chat.otherUser.avatar ? `<img src="${chat.otherUser.avatar}" style="width:54px;height:54px;border-radius:50%;object-fit:cover;">` : (chat.otherUser.displayName?.[0] || '?')}</div>
                        <div class="chat-info"><div class="chat-name">${chat.otherUser.displayName || chat.otherUser.email}</div><div class="chat-last-message">${lastMsg}</div></div>
                        <div class="chat-time">${time}</div>
                    </div>`;
                });
                chatsList.innerHTML = html;
                document.querySelectorAll('.chat-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const chatId = item.dataset.chatId;
                        const otherUid = item.dataset.otherUid;
                        state.currentChatId = chatId;
                        db.collection('users').doc(otherUid).get().then(doc => {
                            state.currentChatParticipant = { uid: otherUid, ...doc.data() };
                        });
                        if (window.innerWidth <= 768) chatsSidebar.classList.add('hide-mobile');
                        chatWindowContainer.classList.remove('hidden');
                        noChatSelected.classList.add('hidden');
                        chatHeader.textContent = `Чат с ${state.currentChatParticipant?.displayName || ''}`;
                        loadMessages(chatId);
                        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                    });
                });
            }

            function loadMessages(chatId) {
                if (state.listeners.messages) state.listeners.messages();
                const q = db.collection('messages').where('chatId', '==', chatId).orderBy('timestamp', 'asc');
                state.listeners.messages = q.onSnapshot(snap => {
                    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderMessages(msgs);
                });
            }

            function renderMessages(msgs) {
                if (!msgs.length) { messagesContainer.innerHTML = '<div class="info-message">Нет сообщений</div>'; return; }
                let html = '';
                msgs.forEach(m => {
                    const isOwn = m.senderId === state.currentUser.uid;
                    const sender = isOwn ? 'Вы' : (state.currentChatParticipant?.displayName || '');
                    const time = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString() : '';
                    let media = '';
                    if (m.mediaURL) {
                        if (m.mediaType === 'image') media = `<img src="${m.mediaURL}" class="message-media" onclick="window.open(this.src)">`;
                        else if (m.mediaType === 'audio') media = `<audio controls src="${m.mediaURL}" class="message-audio"></audio>`;
                        else if (m.mediaType === 'video') media = `<video controls src="${m.mediaURL}" class="message-media"></video>`;
                    }
                    html += `<div class="message ${isOwn ? 'own' : ''}"><div class="message-sender">${sender}</div><div>${m.text || ''}</div>${media}<div class="message-time">${time}</div></div>`;
                });
                messagesContainer.innerHTML = html;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            async function sendMessage(text, mediaURL, mediaType) {
                const msgText = text !== undefined ? text : messageInput.value.trim();
                if (!msgText && !mediaURL) return;
                const msg = {
                    chatId: state.currentChatId,
                    senderId: state.currentUser.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    read: false
                };
                if (msgText) msg.text = msgText;
                if (mediaURL) { msg.mediaURL = mediaURL; msg.mediaType = mediaType; }
                await db.collection('messages').add(msg);
                await db.collection('chats').doc(state.currentChatId).update({
                    lastMessage: msgText || (mediaType === 'image' ? '📷' : '🎤'),
                    lastMessageTimestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    lastMessageSender: state.currentUser.uid,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                if (!mediaURL) messageInput.value = '';
            }

            sendMessageBtn.addEventListener('click', () => sendMessage());
            messageInput.addEventListener('keyup', e => e.key === 'Enter' && sendMessage());

            // Медиа
            attachBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', async e => {
                const file = e.target.files[0];
                if (!file || !state.currentChatId) return;
                const isImage = file.type.startsWith('image/');
                const isVideo = file.type.startsWith('video/');
                if (!isImage && !isVideo) { alert('Только изображения и видео'); return; }
                const ref = storage.ref(`chats/${state.currentChatId}/${Date.now()}_${file.name}`);
                await ref.put(file);
                const url = await ref.getDownloadURL();
                await sendMessage(null, url, isImage ? 'image' : 'video');
                fileInput.value = '';
            });

            // Голос (упрощённо)
            let mediaRecorder, audioChunks, isRecording = false;
            recordBtn.addEventListener('click', async () => {
                if (!state.currentChatId) return;
                if (!isRecording) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        mediaRecorder = new MediaRecorder(stream);
                        audioChunks = [];
                        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                        mediaRecorder.onstop = async () => {
                            const blob = new Blob(audioChunks, { type: 'audio/webm' });
                            const ref = storage.ref(`chats/${state.currentChatId}/${Date.now()}_voice.webm`);
                            await ref.put(blob);
                            const url = await ref.getDownloadURL();
                            await sendMessage(null, url, 'audio');
                            stream.getTracks().forEach(t => t.stop());
                        };
                        mediaRecorder.start();
                        isRecording = true;
                        recordBtn.style.color = '#ff0000';
                    } catch { alert('Нет доступа к микрофону'); }
                } else {
                    mediaRecorder.stop();
                    isRecording = false;
                    recordBtn.style.color = '';
                }
            });

            // Эмодзи
            emojiBtn.addEventListener('click', () => emojiPicker.classList.toggle('show'));
            import('https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.0/index.js')
                .then(module => {
                    const picker = new module.default();
                    emojiPicker.appendChild(picker);
                    picker.addEventListener('emoji-click', e => { messageInput.value += e.detail.unicode; emojiPicker.classList.remove('show'); });
                })
                .catch(console.error);

            // Назад из чата на мобильных
            backFromChatBtn.addEventListener('click', () => {
                chatsSidebar.classList.remove('hide-mobile');
                chatWindowContainer.classList.add('hidden');
                noChatSelected.classList.remove('hidden');
                if (state.listeners.messages) state.listeners.messages();
                state.currentChatId = null;
            });

            // Поиск по чатам
            chatSearchInput.addEventListener('input', e => {
                const q = e.target.value.toLowerCase();
                document.querySelectorAll('.chat-item').forEach(item => {
                    const name = item.querySelector('.chat-name')?.textContent.toLowerCase() || '';
                    item.style.display = name.includes(q) ? 'flex' : 'none';
                });
            });

            // ---------- Модалка друга ----------
            modalMessageBtn.addEventListener('click', () => { if (selectedFriendUid) openChatWithUser(selectedFriendUid); friendModal.classList.remove('show'); });
            modalProfileBtn.addEventListener('click', () => { if (selectedFriendUid) goToUserProfile(selectedFriendUid); friendModal.classList.remove('show'); });
            modalCloseBtn.addEventListener('click', () => friendModal.classList.remove('show'));
            friendModal.addEventListener('click', e => { if (e.target === friendModal) friendModal.classList.remove('show'); });

            // Переход в профиль
            window.goToUserProfile = (uid) => { showSection('profileSection'); loadProfile(uid); };

            // ---------- Аутентификация ----------
            function handleLogin() {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            }
            function handleRegister() {
                const email = document.getElementById('registerEmail').value;
                const pass = document.getElementById('registerPassword').value;
                auth.createUserWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            }
            loginBtn.addEventListener('click', handleLogin);
            registerBtn.addEventListener('click', handleRegister);
            logoutBtn.addEventListener('click', () => auth.signOut());

            loginTab.addEventListener('click', () => {
                loginTab.classList.add('active'); registerTab.classList.remove('active');
                loginForm.classList.remove('hidden'); registerForm.classList.add('hidden');
            });
            registerTab.addEventListener('click', () => {
                registerTab.classList.add('active'); loginTab.classList.remove('active');
                registerForm.classList.remove('hidden'); loginForm.classList.add('hidden');
            });

            // ---------- Состояние авторизации ----------
            auth.onAuthStateChanged(async user => {
                if (user) {
                    state.currentUser = user;
                    authContainer.classList.add('hidden');
                    appContainer.classList.remove('hidden');
                    await ensureUserProfile(user);
                    // очистить подписки
                    Object.values(state.listeners).forEach(fn => fn && fn());
                    showSection('chatsSection');
                } else {
                    state.currentUser = null;
                    authContainer.classList.remove('hidden');
                    appContainer.classList.add('hidden');
                }
            });

            // Коррекция высоты на мобильных
            window.addEventListener('resize', () => {
                document.body.style.height = window.innerHeight + 'px';
                document.getElementById('app').style.height = window.innerHeight + 'px';
            });
        })();
    </script>
</body>
</html>
